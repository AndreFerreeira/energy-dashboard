// parseia CSV ou TSV livre, encontra colunas por nome
function parseRealDataCSV(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>0);
  if(lines.length<2) return {error:'Cole pelo menos uma linha de cabeçalho + 1 linha de dados'};
  // detectar delimitador: vírgula, ponto-vírgula ou tab
  const firstLine=lines[0];
  let delim=',';
  if(firstLine.includes('\t')) delim='\t';
  else if(firstLine.includes(';') && firstLine.split(';').length>firstLine.split(',').length) delim=';';
  const header=lines[0].split(delim).map(c=>c.trim().toLowerCase().replace(/['"]/g,''));
  // mapear colunas
  const find=(names)=>{for(const n of names){const i=header.findIndex(h=>h===n||h.includes(n));if(i>=0) return i;} return -1;};
  const iTower=find(['tower','torre','tag']);
  const iTph=find(['tph','ton_per_hour','ton/h','tonperhour','vazao_massica','vazao']);
  const iKwh=find(['kwh_per_ton','kwh/ton','kwhperton','kwh_ton','consumo_especifico','kwh']);
  const iVapor=find(['vapor_per_ton','vapor/ton','vapor_ton','vaporperton','steam_per_ton','vapor']);
  if(iTower<0||iTph<0) return {error:`Colunas obrigatórias não encontradas. Esperado pelo menos "tower" e "tph". Cabeçalho recebido: ${header.join(', ')}`};
  if(iKwh<0 && iVapor<0) return {error:'Precisa de pelo menos uma coluna kwh_per_ton ou vapor_per_ton'};
  const rowsT1=[],rowsT2=[];
  let skipped=0;
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(delim).map(c=>c.trim().replace(/['"]/g,''));
    if(cols.length<2) {skipped++;continue;}
    const tw=(cols[iTower]||'').toUpperCase().replace(/[^12T]/g,'');
    const tph=parseFloat((cols[iTph]||'').replace(',','.'));
    const kwh=iKwh>=0?parseFloat((cols[iKwh]||'').replace(',','.')):null;
    const vap=iVapor>=0?parseFloat((cols[iVapor]||'').replace(',','.')):null;
    if(!isFinite(tph)||tph<=0){skipped++;continue;}
    const row={tph,kwhPerTon:isFinite(kwh)?kwh:null,vaporPerTon:isFinite(vap)?vap:null};
    if(tw.includes('1')||tw==='T1') rowsT1.push(row);
    else if(tw.includes('2')||tw==='T2') rowsT2.push(row);
    else skipped++;
  }
  return {rowsT1,rowsT2,skipped};
}

function percentile(sorted,p){
  if(!sorted.length) return null;
  const i=(sorted.length-1)*p;
  const lo=Math.floor(i),hi=Math.ceil(i);
  if(lo===hi) return sorted[lo];
  return sorted[lo]+(sorted[hi]-sorted[lo])*(i-lo);
}

// ajusta parâmetros min/opt/max/kwhAtOpt/vaporAtOpt a partir de amostras reais
function fitTowerFromSamples(rows){
  if(rows.length<3) return null;
  const tphSorted=rows.map(r=>r.tph).sort((a,b)=>a-b);
  const min=Math.max(percentile(tphSorted,0.05),tphSorted[0]);
  const max=percentile(tphSorted,0.95);
  // ótimo = tph com menor kwh/ton (se houver); senão mediana
  let opt;
  const withKwh=rows.filter(r=>r.kwhPerTon!==null&&r.kwhPerTon>0);
  if(withKwh.length>=3){
    // bin de tph para achar janela com menor kwh/ton médio
    const nBins=Math.min(10,Math.max(4,Math.floor(withKwh.length/5)));
    const step=(max-min)/nBins;
    let bestBin=null;
    for(let b=0;b<nBins;b++){
      const lo=min+b*step,hi=lo+step;
      const inBin=withKwh.filter(r=>r.tph>=lo&&r.tph<hi);
      if(inBin.length<2) continue;
      const avg=inBin.reduce((s,r)=>s+r.kwhPerTon,0)/inBin.length;
      if(bestBin===null||avg<bestBin.avg) bestBin={avg,lo,hi,center:(lo+hi)/2};
    }
    opt=bestBin?bestBin.center:percentile(tphSorted,0.5);
  } else {
    opt=percentile(tphSorted,0.5);
  }
  // kwhAtOpt e vaporAtOpt: média dos pontos perto de opt (±15%)
  const tolAbs=Math.max((max-min)*0.15,0.3);
  const near=rows.filter(r=>Math.abs(r.tph-opt)<=tolAbs);
  const kwhSamples=(near.length?near:rows).filter(r=>r.kwhPerTon!==null&&r.kwhPerTon>0);
  const vapSamples=(near.length?near:rows).filter(r=>r.vaporPerTon!==null&&r.vaporPerTon>0);
  const kwhAtOpt=kwhSamples.length?kwhSamples.reduce((s,r)=>s+r.kwhPerTon,0)/kwhSamples.length:null;
  const vaporAtOpt=vapSamples.length?vapSamples.reduce((s,r)=>s+r.vaporPerTon,0)/vapSamples.length:null;
  return {
    n:rows.length,
    min:Math.round(min*10)/10,
    opt:Math.round(opt*10)/10,
    max:Math.round(max*10)/10,
    kwhAtOpt:kwhAtOpt?Math.round(kwhAtOpt):null,
    vaporAtOpt:vaporAtOpt?Math.round(vaporAtOpt*100)/100:null
  };
}

function buildSimulatorChart(res){
  const s=SIMULATOR_STATE;
  const w=860,h=300,padL=60,padR=20,padT=20,padB=40;
  const cw=w-padL-padR,ch=h-padT-padB;
  // eixo X: abrange união das faixas das torres
  const xMin=Math.min(s.t1.min,s.t2.min)*0.9;
  const xMax=Math.max(s.t1.max,s.t2.max)*1.05;
  // coleta pontos para calcular yMax
  const samples=80;
  const colors={t1:'#3b82f6',t2:'#f97316'};
  const pointsByTower={};
  ['t1','t2'].forEach(key=>{
    const t=s[key];
    const pts=[];
    for(let i=0;i<=samples;i++){
      const x=xMin+(xMax-xMin)*i/samples;
      if(x<t.min||x>t.max) continue;
      const r=simulateTower(t,x,s.humidity,s.ambientTemp);
      if(r.viavel) pts.push({x,y:r.kwhPerTon});
    }
    pointsByTower[key]=pts;
  });
  const allY=[...pointsByTower.t1.map(p=>p.y),...pointsByTower.t2.map(p=>p.y)];
  const yMin=Math.min(...allY)*0.96;
  const yMax=Math.max(...allY)*1.04;
  const sx=x=>padL+(x-xMin)/(xMax-xMin)*cw;
  const sy=y=>padT+ch-(y-yMin)/(yMax-yMin)*ch;

  let svg=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-width:100%">`;
  // grid
  for(let g=0;g<=4;g++){
    const y=padT+ch*g/4;
    const val=yMax-(yMax-yMin)*g/4;
    svg+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    svg+=`<text x="${padL-8}" y="${y+4}" fill="#94a3b8" font-size="10" text-anchor="end" font-family="monospace">${val.toFixed(0)}</text>`;
  }
  // x-axis ticks
  const xTicks=6;
  for(let i=0;i<=xTicks;i++){
    const x=xMin+(xMax-xMin)*i/xTicks;
    const xp=sx(x);
    svg+=`<line x1="${xp}" y1="${padT+ch}" x2="${xp}" y2="${padT+ch+4}" stroke="#94a3b8" stroke-width="1"/>`;
    svg+=`<text x="${xp}" y="${padT+ch+16}" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="monospace">${x.toFixed(1)}</text>`;
  }
  svg+=`<text x="${padL+cw/2}" y="${h-6}" fill="#64748b" font-size="10" text-anchor="middle" font-weight="600">Tonelagem (t/h)</text>`;
  svg+=`<text x="14" y="${padT+ch/2}" fill="#64748b" font-size="10" text-anchor="middle" font-weight="600" transform="rotate(-90 14 ${padT+ch/2})">Consumo (kWh/ton)</text>`;

  // curves
  ['t1','t2'].forEach(key=>{
    const pts=pointsByTower[key];
    if(pts.length<2) return;
    const col=colors[key];
    const t=s[key];
    let pathD='';
    pts.forEach((p,i)=>{
      pathD+=(i===0?'M':'L')+sx(p.x).toFixed(1)+','+sy(p.y).toFixed(1)+' ';
    });
    svg+=`<path d="${pathD}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>`;
    // marker optimum
    const rOpt=simulateTower(t,t.opt,s.humidity,s.ambientTemp);
    if(rOpt.viavel){
      svg+=`<circle cx="${sx(t.opt)}" cy="${sy(rOpt.kwhPerTon)}" r="5" fill="${col}" stroke="#fff" stroke-width="2"/>`;
    }
    // label at right end
    const last=pts[pts.length-1];
    svg+=`<text x="${sx(last.x)+8}" y="${sy(last.y)+3}" fill="${col}" font-size="11" font-weight="700">${t.name}</text>`;
  });

  // vertical line at current tph
  const curX=res.tph;
  if(curX>=xMin&&curX<=xMax){
    svg+=`<line x1="${sx(curX)}" y1="${padT}" x2="${sx(curX)}" y2="${padT+ch}" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="5,3"/>`;
    svg+=`<rect x="${sx(curX)-34}" y="${padT-2}" width="68" height="16" rx="4" fill="#1e293b"/>`;
    svg+=`<text x="${sx(curX)}" y="${padT+10}" fill="#fff" font-size="10" text-anchor="middle" font-family="monospace" font-weight="600">${curX.toFixed(2)} t/h</text>`;
  }

  // ===== Marcadores do FUNIL: carga real de cada torre vinda das linhas =====
  const funnelLoads=computeFunnelLoads();
  const funnelPoints=[
    {key:'t1',load:funnelLoads.T1,color:colors.t1,tower:s.t1,label:'T1 funil'},
    {key:'t2',load:funnelLoads.T2,color:colors.t2,tower:s.t2,label:'T2 funil'}
  ];
  funnelPoints.forEach((fp,idx)=>{
    if(fp.load<=0) return;
    if(fp.load<xMin||fp.load>xMax) return;
    const r=simulateTower(fp.tower,fp.load,s.humidity,s.ambientTemp);
    if(!r.viavel) return;
    const fx=sx(fp.load), fy=sy(r.kwhPerTon);
    // linha vertical tracejada na cor da torre
    svg+=`<line x1="${fx}" y1="${padT}" x2="${fx}" y2="${padT+ch}" stroke="${fp.color}" stroke-width="1.2" stroke-dasharray="3,3" stroke-opacity="0.7"/>`;
    // losango no ponto de operação
    svg+=`<polygon points="${fx},${fy-7} ${fx+7},${fy} ${fx},${fy+7} ${fx-7},${fy}" fill="#fff" stroke="${fp.color}" stroke-width="2.5"/>`;
    // etiqueta na base com badge
    const labelY=padT+ch-6-(idx*16);
    const labelW=82;
    svg+=`<rect x="${fx-labelW/2}" y="${labelY-11}" width="${labelW}" height="14" rx="3" fill="${fp.color}" fill-opacity="0.92"/>`;
    svg+=`<text x="${fx}" y="${labelY-1}" fill="#fff" font-size="9" text-anchor="middle" font-family="monospace" font-weight="700">${fp.label} ${fp.load.toFixed(1)}t/h</text>`;
  });

  svg+=`</svg>`;
  return svg;
}

function updateSimInput(field,value){
  SIMULATOR_STATE[field]=parseFloat(value)||0;
  renderSimulatorView();
}
function updateTowerParam(tower,field,value){
  SIMULATOR_STATE[tower][field]=parseFloat(value)||0;
  SIMULATOR_STATE.dataSource='real'; // edição manual conta como "ajustado"
  renderSimulatorView();
}
function toggleSimParams(){
  SIMULATOR_STATE.showParams=!SIMULATOR_STATE.showParams;
  renderSimulatorView();
}
function toggleSimImport(){
  SIMULATOR_STATE.showImport=!SIMULATOR_STATE.showImport;
  renderSimulatorView();
}
function loadRealData(){
  const ta=document.getElementById('simImportText');
  const text=ta?ta.value:'';
  SIMULATOR_STATE.importText=text;
  if(!text.trim()){
    SIMULATOR_STATE.importStatus={ok:false,msg:'Cole o CSV primeiro'};
    renderSimulatorView();
    return;
  }
  const parsed=parseRealDataCSV(text);
  if(parsed.error){
    SIMULATOR_STATE.importStatus={ok:false,msg:parsed.error};
    renderSimulatorView();
    return;
  }
  const fitT1=fitTowerFromSamples(parsed.rowsT1);
  const fitT2=fitTowerFromSamples(parsed.rowsT2);
  if(!fitT1&&!fitT2){
    SIMULATOR_STATE.importStatus={ok:false,msg:'Dados insuficientes — precisa ao menos 3 linhas por torre'};
    renderSimulatorView();
    return;
  }
  // aplicar aos parâmetros existentes (preserva o que faltar)
  const apply=(key,fit)=>{
    if(!fit) return;
    const t=SIMULATOR_STATE[key];
    if(fit.min>0) t.min=fit.min;
    if(fit.max>fit.min) t.max=fit.max;
    if(fit.opt>=fit.min&&fit.opt<=fit.max) t.opt=fit.opt;
    if(fit.kwhAtOpt) t.kwhAtOpt=fit.kwhAtOpt;
    if(fit.vaporAtOpt) t.vaporAtOpt=fit.vaporAtOpt;
  };
  apply('t1',fitT1);
  apply('t2',fitT2);
  SIMULATOR_STATE.dataSource='real';
  const parts=[];
  if(fitT1) parts.push(`T1: ${fitT1.n} linhas`);
  if(fitT2) parts.push(`T2: ${fitT2.n} linhas`);
  if(parsed.skipped) parts.push(`${parsed.skipped} linhas ignoradas`);
  SIMULATOR_STATE.importStatus={
    ok:true,
    msg:`Curvas ajustadas (${parts.join(' · ')})`,
    fitted:{t1:fitT1,t2:fitT2}
  };
  renderSimulatorView();
}
function clearRealData(){
  SIMULATOR_STATE.importText='';
  SIMULATOR_STATE.importStatus=null;
  SIMULATOR_STATE.dataSource='default';
  SIMULATOR_STATE.t1={name:'Torre 1',min:4,opt:6.5,max:8,kwhAtOpt:215,vaporAtOpt:1.85};
  SIMULATOR_STATE.t2={name:'Torre 2',min:5,opt:8,max:10,kwhAtOpt:198,vaporAtOpt:1.78};
  renderSimulatorView();
}

function buildRadarChart(items){
  if(!items||items.length<2) return '<div style="padding:30px;color:var(--dim);text-align:center;font-size:13px">Selecione ao menos 2 equipamentos para comparar</div>';

  // Helpers — buscam tags específicas dentro do equipamento (não apenas a tag primária)
  const findTag=(eq,pred)=>{
    const e=EQUIPMENT[eq.id];
    if(!e||!e.tags) return null;
    return e.tags.find(pred)||null;
  };
  const getCorrenteRaw=v=>{
    const t=findTag(v,t=>t.unit==='A'&&(t.var.includes('Corrente')||t.var.includes('corrente')));
    return t?Math.abs(t.value||0):0;
  };
  const getTemperaturaRaw=v=>{
    const t=findTag(v,t=>t.unit==='°C'||t.var.includes('Temperatura'));
    return t?Math.abs(t.value||0):0;
  };
  const getVibracaoRaw=v=>{
    // Vibração: cartões VT expõem "Corrente Bits Cartão" em mA; também aceitamos tags com "Vibração"
    const t=findTag(v,t=>(t.unit==='mA'&&t.var.includes('Corrente Bits'))||t.var.includes('Vibração')||t.var.includes('vibra'));
    return t?Math.abs(t.value||0):0;
  };

  // Dimensões genéricas normalizadas em % (funcionam para qualquer tipo de ativo)
  const data=items.map(v=>{
    const t=v.primaryTag||{};
    const nom=v.nomVal||1;
    const valueAbs=Math.abs(t.value||0);
    const nomAbs=Math.abs(nom);
    return {
      id:v.id,
      name:v.name,
      type:v.type,
      desvioAbs:Math.abs(v.desvio||0),
      ideNorm:Math.min(((v.ide||1)-0.8)*500,100), // 0.8→0, 1.0→100
      cv:v.cv||0,
      amplitudePct:(t.max!=null&&t.min!=null&&nomAbs)?(Math.abs(t.max-t.min)/nomAbs)*100:0,
      cargaPct:nomAbs?(valueAbs/nomAbs)*100:0,
      correnteRaw:getCorrenteRaw(v),
      temperaturaRaw:getTemperaturaRaw(v),
      vibracaoRaw:getVibracaoRaw(v)
    };
  });

  // Escalas dinâmicas para as grandezas físicas (topo do radar = maior valor da seleção com folga)
  const maxCorrente=Math.max(...data.map(d=>d.correnteRaw),1)*1.1;
  const maxTemperatura=Math.max(...data.map(d=>d.temperaturaRaw),1)*1.1;
  const maxVibracao=Math.max(...data.map(d=>d.vibracaoRaw),1)*1.1;

  const dims=[
    {key:'desvioAbs',label:'Desvio %',max:Math.max(...data.map(d=>d.desvioAbs||0),15)*1.1},
    {key:'ideNorm',label:'IDE',max:100},
    {key:'cv',label:'Variabilidade',max:Math.max(...data.map(d=>d.cv||0),30)*1.1},
    {key:'correnteRaw',label:'Corrente (A)',max:maxCorrente,unit:'A'},
    {key:'temperaturaRaw',label:'Temperatura (°C)',max:maxTemperatura,unit:'°C'},
    {key:'vibracaoRaw',label:'Vibração (mA)',max:maxVibracao,unit:'mA'}
  ];
  items=data;
  const cx=260,cy=210,r=145;
  const n=dims.length;
  const colors=['#3b82f6','#f97316','#10b981','#8b5cf6'];
  const pt=(i,v)=>{
    const ang=-Math.PI/2+(i*2*Math.PI/n);
    return [cx+Math.cos(ang)*r*v,cy+Math.sin(ang)*r*v];
  };
  let svg=`<svg class="radar-svg" viewBox="0 0 520 440" preserveAspectRatio="xMidYMid meet">`;
  // grid rings
  for(let g=1;g<=4;g++){
    let pts='';
    for(let i=0;i<n;i++){const [x,y]=pt(i,g/4);pts+=`${x},${y} `;}
    svg+=`<polygon points="${pts.trim()}" fill="none" stroke="#e5e7eb" stroke-width="1"/>`;
  }
  // axes + labels — anchor inteligente conforme o ângulo para evitar sobreposição
  for(let i=0;i<n;i++){
    const [x,y]=pt(i,1);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    const ang=-Math.PI/2+(i*2*Math.PI/n);
    const cos=Math.cos(ang),sin=Math.sin(ang);
    const [lx,ly]=[cx+cos*(r+22),cy+sin*(r+12)];
    let anchor='middle';
    if(cos>0.3) anchor='start';
    else if(cos<-0.3) anchor='end';
    let baseline='middle';
    if(sin<-0.5) baseline='baseline';
    else if(sin>0.5) baseline='hanging';
    // Label em duas linhas se for grande (ex.: "Temperatura (°C)")
    const lbl=dims[i].label;
    const parts=lbl.split(' (');
    if(parts.length===2){
      svg+=`<text x="${lx}" y="${ly-6}" fill="#475569" font-size="10" font-weight="600" text-anchor="${anchor}" dominant-baseline="${baseline}">${parts[0]}</text>`;
      svg+=`<text x="${lx}" y="${ly+7}" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="${anchor}" dominant-baseline="${baseline}">(${parts[1]}</text>`;
    }else{
      svg+=`<text x="${lx}" y="${ly}" fill="#475569" font-size="10" font-weight="600" text-anchor="${anchor}" dominant-baseline="${baseline}">${lbl}</text>`;
    }
  }
  // polygons
  items.slice(0,4).forEach((it,idx)=>{
    let pts='';
    for(let i=0;i<n;i++){
      const raw=it[dims[i].key]||0;
      const v=Math.min(1,raw/dims[i].max);
      const [x,y]=pt(i,v);
      pts+=`${x},${y} `;
    }
    const col=colors[idx%colors.length];
    svg+=`<polygon points="${pts.trim()}" fill="${col}" fill-opacity="0.15" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;
    // dots
    for(let i=0;i<n;i++){
      const raw=it[dims[i].key]||0;
      const v=Math.min(1,raw/dims[i].max);
      const [x,y]=pt(i,v);
      svg+=`<circle cx="${x}" cy="${y}" r="3" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
    }
  });
  svg+=`</svg>`;
  let legend=`<div class="radar-legend">`;
  items.slice(0,4).forEach((it,idx)=>{
    const col=colors[idx%colors.length];
    legend+=`<div class="radar-legend-item"><span class="radar-legend-dot" style="background:${col}"></span><span class="mono" style="font-weight:600;color:var(--text)">${esc(it.id)}</span><span style="color:var(--dim)">${esc(it.name)}</span></div>`;
  });
  legend+=`</div>`;
  return `<div class="radar-wrap">${svg}${legend}</div>`;
}

// Multi-line chart: série sintética de consumo por ativo (24 pontos)
function buildMultiLineConsumption(items,points){
  points=points||24;
  if(!items.length) return '';
  const w=860,h=280,padL=56,padR=20,padT=16,padB=36;
  const cw=w-padL-padR,ch=h-padT-padB;
  const colors=['#3b82f6','#f97316','#10b981','#8b5cf6','#ec4899','#06b6d4','#f59e0b','#ef4444'];
  const series=items.map((it,idx)=>{
    const pt=it.primaryTag||{};
    return {id:it.id,name:it.name,unit:pt.unit||'',vals:buildTrendSeries(it.id,pt.value||0,pt.std||0,points),col:colors[idx%colors.length]};
  });
  const allVals=series.flatMap(s=>s.vals);
  const mn=Math.min(...allVals),mx=Math.max(...allVals);
  const rng=(mx-mn)||1;
  const step=cw/(points-1);
  const sx=i=>padL+i*step;
  const sy=v=>padT+ch*(1-(v-mn)/rng);
  let svg=`<svg class="multi-line-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-width:100%">`;
  // grid lines (5 horizontal)
  for(let g=0;g<=4;g++){
    const y=padT+ch*g/4;
    const val=mx-rng*g/4;
    svg+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    svg+=`<text x="${padL-8}" y="${y+4}" fill="#94a3b8" font-size="10" text-anchor="end" font-family="ui-monospace,monospace">${val.toFixed(0)}</text>`;
  }
  // x labels (hours)
  for(let i=0;i<points;i+=points>=24?6:4){
    const x=sx(i);
    svg+=`<text x="${x}" y="${h-padB+18}" fill="#94a3b8" font-size="10" text-anchor="middle">${(24-points+i).toString().padStart(2,'0')}h</text>`;
  }
  // lines
  series.forEach(s=>{
    let path='';
    s.vals.forEach((v,i)=>{const x=sx(i),y=sy(v);path+=(i===0?`M ${x} ${y}`:` L ${x} ${y}`);});
    svg+=`<path d="${path}" fill="none" stroke="${s.col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    // endpoint dot
    const last=s.vals[s.vals.length-1];
    svg+=`<circle cx="${sx(points-1)}" cy="${sy(last)}" r="3.5" fill="${s.col}" stroke="#fff" stroke-width="1.5"/>`;
  });
  svg+=`</svg>`;
  let legend=`<div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;padding-top:12px;border-top:1px solid var(--border)">`;
  series.forEach(s=>{
    const first=s.vals[0],last=s.vals[s.vals.length-1];
    const delta=first!==0?((last-first)/Math.abs(first))*100:0;
    const dcol=delta>0.5?'var(--red)':delta<-0.5?'var(--green)':'var(--dim)';
    legend+=`<div style="display:flex;align-items:center;gap:6px;font-size:11px">
      <span style="width:12px;height:3px;background:${s.col};border-radius:2px"></span>
      <span class="mono" style="font-weight:600;color:var(--text)">${esc(s.id)}</span>
      <span style="color:var(--dim)">${fmt(last)}${s.unit?' '+esc(s.unit):''}</span>
      <span style="color:${dcol};font-weight:600">${delta>=0?'+':''}${delta.toFixed(1)}%</span>
    </div>`;
  });
  legend+=`</div>`;
  return svg+legend;
}

function buildDeviationHeatmap(items,days){
  days=days||30;
  // deterministic seeded pseudo-random based on tag id
  const hash=s=>{let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return h;};
  const rand=(seed,i)=>{const x=Math.sin(seed*9301+i*49297+233)*43758.5453;return x-Math.floor(x);};
  const colorFor=v=>{
    // v in -40..+40 (signed)
    if(v<-10) return '#10b981';
    if(v<-5) return '#34d399';
    if(v<-2) return '#a7f3d0';
    if(v<2) return '#e5e7eb';
    if(v<5) return '#fde68a';
    if(v<10) return '#f59e0b';
    if(v<20) return '#f97316';
    return '#ef4444';
  };
  let html=`<div class="heatmap-wrap"><table class="heatmap-table"><thead><tr><th style="text-align:left;padding:0 10px 6px 0;font-size:10px;color:var(--dim);font-weight:600">ATIVO</th>`;
  for(let d=1;d<=days;d++){
    html+=`<th style="font-size:9px;color:var(--dim);font-weight:500;padding:0 0 6px 0;text-align:center;width:22px">${d}</th>`;
  }
  html+=`</tr></thead><tbody>`;
  items.forEach(it=>{
    const seed=hash(it.id);
    const base=it.desvio||0;
    html+=`<tr><td class="mono" style="padding:2px 10px 2px 0;font-size:11px;font-weight:600;color:var(--text);white-space:nowrap">${esc(it.id)}</td>`;
    for(let d=0;d<days;d++){
      const noise=(rand(seed,d)-0.5)*8;
      const trend=Math.sin(d/5+seed%10)*3;
      const v=base+noise+trend;
      const col=colorFor(v);
      html+=`<td style="padding:0"><div class="heatmap-cell" style="background:${col}" title="${esc(it.id)} · dia ${d+1}: ${v>0?'+':''}${v.toFixed(1)}%"></div></td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  html+=`<div style="display:flex;align-items:center;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
    <span style="font-size:10px;color:var(--dim);font-weight:600">ESCALA</span>
    <span style="font-size:10px;color:var(--green)">-20%</span>
    <div class="heatmap-legend-gradient"></div>
    <span style="font-size:10px;color:var(--red)">+20%</span>
  </div></div>`;
  return html;
}

function updateEquipNominal(id,key,val){
  const e=EQUIPMENT[id]; if(!e) return;

  e.nominal=e.nominal||{};

}
function updateEquipTagValue(id,tagVar,val){
  const e=EQUIPMENT[id]; if(!e) return;

  const t=e.tags.find(t=>t.var===tagVar);
  if(t) t.value=num;

function resetEquipNominal(id){
  const orig=EQUIPMENT_INITIAL[id];
  if(!orig||!EQUIPMENT[id]) return;

  if(orig.tags&&EQUIPMENT[id].tags){
    orig.tags.forEach(ot=>{
      const t=EQUIPMENT[id].tags.find(t=>t.var===ot.var);
      if(t&&ot.value!=null) t.value=ot.value;

}

// Calcula a demanda agregada do funil por torre.
// Se uma linha alimenta 2 torres, divide a capacidade igualmente entre elas.
function computeFunnelLoads(){
  const load={T1:0,T2:0};
  const linesPerTower={T1:0,T2:0};
  let orphans=0;
  LINES_STATE.lines.forEach(l=>{
    if(!l.active) return;
    if(l.towers.length===0){orphans++;return;}
    const share=l.capacity/l.towers.length;
    l.towers.forEach(t=>{load[t]+=share;linesPerTower[t]++;});
  });
  return {
    T1:load.T1,T2:load.T2,
    linesT1:linesPerTower.T1,linesT2:linesPerTower.T2,
    total:load.T1+load.T2,
    orphans,
    capT1:LINES_STATE.towerCapacity.T1,
    capT2:LINES_STATE.towerCapacity.T2
  };
}

function refreshFunnel(){
  // re-renderiza o Simulador inteiro (o funil está dentro dele)
  if(document.getElementById('simulatorView')) renderSimulatorView();
}

// Puxa a demanda atual do funil para os inputs do simulador
function syncSimFromFunnel(){
  const f=computeFunnelLoads();
  const s=SIMULATOR_STATE;
  // total ton/dia = (T1+T2) * horas operacionais
  s.tonsPerDay=Math.round(f.total*s.hoursPerDay);
  s.dataSource='real';
  renderSimulatorView();
}

  refreshFunnel();
}

function buildLinhasFunnel(){
  const lines=LINES_STATE.lines;
  const active=lines.filter(l=>l.active);
  const inactive=lines.filter(l=>!l.active);

  const f=computeFunnelLoads();
  const load={T1:f.T1,T2:f.T2};
  const linesPerTower={T1:f.linesT1,T2:f.linesT2};
  const capT1=f.capT1, capT2=f.capT2;
  const pctT1=capT1?(load.T1/capT1*100):0;
  const pctT2=capT2?(load.T2/capT2*100):0;
  const totalLoad=f.total;
  const orphans=f.orphans;
  const pctColor=p=>p>100?'#E74C3C':p>85?'#F5B041':'#28A745';

  // === Conexão com o simulador ===
  // Calcula o consumo de cada torre NO ponto onde o funil a está operando
  // (usa a mesma função do simulador com a mesma umidade e temperatura)
  const s=SIMULATOR_STATE;
  const simT1=load.T1>0?simulateTower(s.t1,load.T1,s.humidity,s.ambientTemp):null;
  const simT2=load.T2>0?simulateTower(s.t2,load.T2,s.humidity,s.ambientTemp):null;
  const kwhT1=(simT1&&simT1.viavel)?simT1.kwhPerTon:null;
  const kwhT2=(simT2&&simT2.viavel)?simT2.kwhPerTon:null;
  const statusT1=simT1?(simT1.viavel?'ok':'fora'):'off';
  const statusT2=simT2?(simT2.viavel?'ok':'fora'):'off';

  const renderLineMini=l=>{
    const isT1=l.towers.includes('T1'), isT2=l.towers.includes('T2');
    const badgeColor=l.active?(isT1&&isT2?'#8E44AD':isT1?'#2E75B6':isT2?'#28A745':'#BDC3C7'):'#E5E7EB';
    const statusBg=l.active?'#D4EDDA':'#FADBD8';
    const statusTxt=l.active?'#155724':'#721C24';
    return `
      <div class="line-card" data-line-id="${l.id}" style="border:2px solid ${l.active?badgeColor:'#E5E7EB'};border-radius:9px;padding:8px;background:${l.active?'#fff':'#F8F9FA'};opacity:${l.active?1:0.6};transition:all .2s;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:4px;margin-bottom:4px">
          <div style="min-width:0">
            <div style="font-weight:700;font-size:11.5px;color:${l.active?'#212B36':'#9CA3AF'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.name}</div>
            <div style="font-size:9px;color:var(--text-muted);font-family:monospace">${l.id}</div>
          </div>
          <label title="Ativar/desativar" style="font-size:9px;display:flex;align-items:center;cursor:pointer;background:${statusBg};color:${statusTxt};padding:2px 6px;border-radius:9px;font-weight:700;white-space:nowrap">
            <input type="checkbox" ${l.active?'checked':''} onchange="toggleLineActive('${l.id}')" style="margin:0 3px 0 0;transform:scale(.8)">
            ${l.active?'ON':'OFF'}
          </label>
        </div>
        <div style="display:flex;gap:3px;margin:4px 0">
          <button onclick="toggleLineTower('${l.id}','T1')" style="flex:1;padding:3px 4px;border-radius:5px;border:1px solid ${isT1?'#2E75B6':'#E5E7EB'};background:${isT1?'#2E75B6':'#fff'};color:${isT1?'#fff':'#6B7280'};font-size:10px;font-weight:700;cursor:pointer">T1</button>
          <button onclick="toggleLineTower('${l.id}','T2')" style="flex:1;padding:3px 4px;border-radius:5px;border:1px solid ${isT2?'#28A745':'#E5E7EB'};background:${isT2?'#28A745':'#fff'};color:${isT2?'#fff':'#6B7280'};font-size:10px;font-weight:700;cursor:pointer">T2</button>
        </div>
        <div style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-muted)">
          <input type="number" step="0.1" value="${l.capacity}" onchange="setLineCapacity('${l.id}',this.value)" style="width:100%;padding:1px 3px;font-size:10px;border:1px solid #E5E7EB;border-radius:3px;text-align:right">
          <span>t/h</span>
        </div>
      </div>
    `;
  };

  const poLines=lines.filter(l=>l.type==='po');
  const cartuchoLines=lines.filter(l=>l.type==='cartucho');
  const poAct=poLines.filter(l=>l.active).length;
  const cartAct=cartuchoLines.filter(l=>l.active).length;

  return `
    <div class="card" style="border:1px solid var(--accent);margin-top:16px">
      <div class="card-title">Funil de Distribuição — Torres → Linhas de Embalagem
        <span class="sub">qual torre alimenta cada linha de embalagem</span>
      </div>

      <div style="background:#FFF4E5;border:1px solid #F5B766;border-radius:8px;padding:8px 12px;color:#8A5200;font-size:11.5px;margin-bottom:12px">
        <b>⚠ Protótipo:</b> 18 linhas placeholder (9 pó + 9 cartucho de pó/caixas). Substituo pelos dados reais quando chegarem.
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn" onclick="setAllLinesActive(true)">Ativar todas</button>
        <button class="btn" onclick="setAllLinesActive(false)">Desativar todas</button>
        <button class="btn" onclick="resetLinesDemo()">Restaurar padrão</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:14px">
        <div class="kpi-card"><div class="kpi-label">Linhas ativas</div><div class="kpi-value">${active.length}/${lines.length}</div><div class="kpi-hint">${inactive.length} inativa(s)</div></div>
        <div class="kpi-card"><div class="kpi-label">Produção total</div><div class="kpi-value">${totalLoad.toFixed(1)} <span style="font-size:12px">t/h</span></div><div class="kpi-hint">somando T1 + T2</div></div>
        <div class="kpi-card"><div class="kpi-label">Torre 1</div><div class="kpi-value" style="color:${pctColor(pctT1)}">${load.T1.toFixed(1)} <span style="font-size:12px">t/h</span></div><div class="kpi-hint">${linesPerTower.T1} linhas · ${pctT1.toFixed(0)}% cap.</div></div>
        <div class="kpi-card"><div class="kpi-label">Torre 2</div><div class="kpi-value" style="color:${pctColor(pctT2)}">${load.T2.toFixed(1)} <span style="font-size:12px">t/h</span></div><div class="kpi-hint">${linesPerTower.T2} linhas · ${pctT2.toFixed(0)}% cap.</div></div>
        ${orphans>0?`<div class="kpi-card" style="border:1px solid #E74C3C"><div class="kpi-label" style="color:#E74C3C">⚠ Sem torre</div><div class="kpi-value" style="color:#E74C3C">${orphans}</div><div class="kpi-hint">ativa(s) sem torre</div></div>`:''}
      </div>

      <!-- FUNIL: topo estreito com 2 torres, base larga com 18 linhas -->
      <div id="linhas-layout" style="position:relative">
        <svg id="linhas-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0"></svg>

        <!-- NÍVEL 1: duas torres centralizadas (boca do funil) -->
        <div style="position:relative;z-index:1;display:flex;justify-content:center;gap:30px;margin-bottom:22px">
          <div class="card" id="tower-T1-card" style="border:3px solid #2E75B6;padding:14px 20px;min-width:230px;text-align:center;background:linear-gradient(180deg,#EAF3FB 0%,#fff 100%)">
            <div style="font-weight:800;font-size:18px;color:#2E75B6;letter-spacing:.5px">TORRE 1</div>
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px">Spray Dryer T1</div>
            <div style="font-size:26px;font-weight:800;color:${pctColor(pctT1)}">${load.T1.toFixed(1)} <span style="font-size:12px;font-weight:500">t/h</span></div>
            <div style="font-size:10px;color:var(--text-muted)">${linesPerTower.T1} linhas · ${pctT1.toFixed(0)}% de ${capT1} t/h</div>
            <div style="margin-top:6px;height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden">
              <div style="width:${Math.min(100,pctT1)}%;height:100%;background:${pctColor(pctT1)};transition:width .3s"></div>
            </div>
            <div style="margin-top:8px;padding-top:6px;border-top:1px dashed #D1D5DB;font-size:11px">
              ${statusT1==='off'?'<span style="color:#94a3b8">sem demanda</span>':
                statusT1==='fora'?'<span style="color:#E74C3C;font-weight:700">⚠ fora da faixa do simulador</span>':
                `<span style="color:#2E75B6;font-weight:700">${kwhT1.toFixed(0)} kWh/ton</span> <span style="color:var(--text-muted)">@ ${load.T1.toFixed(1)} t/h</span>`}
            </div>
          </div>
          <div class="card" id="tower-T2-card" style="border:3px solid #28A745;padding:14px 20px;min-width:230px;text-align:center;background:linear-gradient(180deg,#E8F6EC 0%,#fff 100%)">
            <div style="font-weight:800;font-size:18px;color:#28A745;letter-spacing:.5px">TORRE 2</div>
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px">Spray Dryer T2</div>
            <div style="font-size:26px;font-weight:800;color:${pctColor(pctT2)}">${load.T2.toFixed(1)} <span style="font-size:12px;font-weight:500">t/h</span></div>
            <div style="font-size:10px;color:var(--text-muted)">${linesPerTower.T2} linhas · ${pctT2.toFixed(0)}% de ${capT2} t/h</div>
            <div style="margin-top:6px;height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden">
              <div style="width:${Math.min(100,pctT2)}%;height:100%;background:${pctColor(pctT2)};transition:width .3s"></div>
            </div>
            <div style="margin-top:8px;padding-top:6px;border-top:1px dashed #D1D5DB;font-size:11px">
              ${statusT2==='off'?'<span style="color:#94a3b8">sem demanda</span>':
                statusT2==='fora'?'<span style="color:#E74C3C;font-weight:700">⚠ fora da faixa do simulador</span>':
                `<span style="color:#28A745;font-weight:700">${kwhT2.toFixed(0)} kWh/ton</span> <span style="color:var(--text-muted)">@ ${load.T2.toFixed(1)} t/h</span>`}
            </div>
          </div>
        </div>

        <!-- espaço para as curvas do funil -->
        <div style="height:46px"></div>

        <!-- NÍVEL 2: base larga do funil com as 18 linhas -->
        <div style="position:relative;z-index:1;display:flex;flex-direction:column;gap:12px">
          <div class="card" style="padding:10px 12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div style="font-weight:700;font-size:13px;color:#2E75B6">Pó (9 linhas)</div>
              <div style="font-size:10px;color:var(--text-muted)">${poAct} ativa(s) de ${poLines.length}</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:6px">
              ${poLines.map(renderLineMini).join('')}
            </div>
          </div>
          <div class="card" style="padding:10px 12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div style="font-weight:700;font-size:13px;color:#9B59B6">Cartucho de Pó — Caixas (9 linhas)</div>
              <div style="font-size:10px;color:var(--text-muted)">${cartAct} ativa(s) de ${cartuchoLines.length}</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:6px">
              ${cartuchoLines.map(renderLineMini).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function drawLinhasLinks(){
  const svg=document.getElementById('linhas-svg');
  const layout=document.getElementById('linhas-layout');
  if(!svg||!layout) return;
  const svgRect=svg.getBoundingClientRect();
  svg.setAttribute('width',svgRect.width);
  svg.setAttribute('height',svgRect.height);
  svg.innerHTML='';

  const towerT1=document.getElementById('tower-T1-card');
  const towerT2=document.getElementById('tower-T2-card');
  if(!towerT1||!towerT2) return;
  const t1r=towerT1.getBoundingClientRect();
  const t2r=towerT2.getBoundingClientRect();
  // ponto de saída das torres = centro inferior (funil de cima para baixo)
  const tp={
    T1:{x:t1r.left+t1r.width/2-svgRect.left,y:t1r.bottom-svgRect.top},
    T2:{x:t2r.left+t2r.width/2-svgRect.left,y:t2r.bottom-svgRect.top}
  };
  const tColor={T1:'#2E75B6',T2:'#28A745'};

  LINES_STATE.lines.forEach(l=>{
    if(!l.active||l.towers.length===0) return;
    const card=document.querySelector(`[data-line-id="${l.id}"]`);
    if(!card) return;
    const cr=card.getBoundingClientRect();
    const lp={x:cr.left+cr.width/2-svgRect.left,y:cr.top-svgRect.top};
    l.towers.forEach(t=>{
      const sp=tp[t]; if(!sp) return;
      // curva vertical: controle no meio do caminho
      const midY=(sp.y+lp.y)/2;
      const d=`M ${sp.x} ${sp.y} C ${sp.x} ${midY}, ${lp.x} ${midY}, ${lp.x} ${lp.y}`;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',d);
      path.setAttribute('fill','none');
      path.setAttribute('stroke',tColor[t]);
      path.setAttribute('stroke-width','2');
      path.setAttribute('stroke-opacity','0.5');
      path.setAttribute('stroke-linecap','round');
      svg.appendChild(path);
      // dot na torre
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',sp.x); dot.setAttribute('cy',sp.y);
      dot.setAttribute('r','3'); dot.setAttribute('fill',tColor[t]);
      svg.appendChild(dot);
    });
  });
}
// redesenha paths ao redimensionar (funil dentro do Simulador)
window.addEventListener('resize',()=>{
  if(document.getElementById('linhas-svg')) drawLinhasLinks();
});

function renderParams(){
  const totalEquip=Object.keys(EQUIPMENT).length;
  const areas=Array.from(new Set(Object.keys(EQUIPMENT).map(id=>EQUIPMENT[id].area))).sort();
  const groups={};
  Object.keys(EQUIPMENT).forEach(id=>{const a=EQUIPMENT[id].area;(groups[a]=groups[a]||[]).push(id);});
  const typesSet=new Set(Object.keys(EQUIPMENT).map(id=>EQUIPMENT[id].type));
  return `
    <div class="card" style="border:1px solid var(--accent)">
      <div class="card-title" style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">⚙️</span> Parâmetros dos Equipamentos
        <span style="font-size:11px;color:var(--dim);font-weight:500">edite valores nominais e leituras &middot; ${totalEquip} equipamentos &middot; ${areas.length} áreas</span>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">
        Ajuste os valores nominais usados nos cálculos de desvio (nominal vs atual), custo, alertas e previsão de energia.
        As leituras correntes também podem ser corrigidas manualmente antes de um novo import KQL. Alterações são aplicadas na hora &mdash; basta trocar de aba para ver o impacto nos gráficos.
      </p>
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <input type="text" placeholder="Buscar por TAG, nome, tipo..." oninput="setParamPanelSearch(this.value)" style="flex:1;min-width:200px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px">
        <select onchange="setParamPanelArea(this.value)" style="padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;min-width:180px">
          <option value="all">Todas as áreas (${totalEquip})</option>
          ${areas.map(a=>`<option value="${esc(a)}">${esc(a)} (${(groups[a]||[]).length})</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;padding:10px 12px;background:var(--bg2);border-radius:8px">
        <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;align-self:center;margin-right:6px">Tipos presentes:</div>
        ${Array.from(typesSet).sort().map(t=>`<span style="font-size:10px;color:var(--muted);background:var(--bg);padding:3px 9px;border-radius:4px;border:1px solid var(--border)">${esc(t)}</span>`).join('')}
      </div>
      <div id="param-panel-list" style="max-height:68vh;overflow-y:auto;padding-right:6px">${buildParamPanelList()}</div>
    </div>

    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">💡</span> Dicas de uso
      </div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7">
        <strong style="color:var(--text)">Nominal vs Leitura:</strong> o valor nominal é o ponto de operação esperado (placa do motor, setpoint de projeto). A leitura é o valor medido atual. O desvio % é calculado como <code style="background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:11px">(leitura − nominal) / nominal × 100</code>.<br><br>
        <strong style="color:var(--text)">Restaurar:</strong> cada card tem um botão "↺ restaurar" que volta os valores daquele equipamento específico para os originais, sem afetar os outros.<br><br>
        <strong style="color:var(--text)">Limpar tudo:</strong> para restaurar o estado completo da planta (todos os equipamentos + imports), use o botão "Limpar Todos os Dados" na aba Configurações.<br><br>
        <strong style="color:var(--yellow)">Persistência:</strong> as alterações ficam apenas nesta sessão do navegador. Para manter, exporte novamente via KQL ou use o import de CSV depois de validar os valores aqui.
      </div>
    </div>
  `;
}

        </div>
        <div>
          <label style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px">Tarifa Energia (R$/kWh)</label>
          <input type="number" id="cp-tarifa" value="${COST_PARAMS.tarifa}" min="0" step="0.01" onchange="updateCostParam('tarifa',this.value)" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'SF Mono',monospace;font-size:13px">
          <div style="font-size:9px;color:var(--dim);margin-top:3px">Conta de energia (TUSD+TE)</div>
        </div>
        <div>
          <label style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px">Custo Vapor (R$/ton)</label>
          <input type="number" id="cp-vapor" value="${COST_PARAMS.custoVapor}" min="0" step="1" onchange="updateCostParam('custoVapor',this.value)" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'SF Mono',monospace;font-size:13px">
          <div style="font-size:9px;color:var(--dim);margin-top:3px">Combustível + água + químicos</div>
        </div>
        <div>
          <label style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px">Horas Operação/Dia</label>
          <input type="number" id="cp-horas" value="${COST_PARAMS.horasDia}" min="1" max="24" step="1" onchange="updateCostParam('horasDia',this.value)" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'SF Mono',monospace;font-size:13px">
          <div style="font-size:9px;color:var(--dim);margin-top:3px">Para anualizar R$/mês</div>
        </div>
      </div>
      <div style="margin-top:12px;padding:10px 14px;background:rgba(59,130,246,0.08);border-left:3px solid var(--accent);border-radius:6px;font-size:11px;color:var(--muted)">
        <strong style="color:var(--accent)">Resultado atual:</strong> ${(()=>{const c=calcCustoTotal();return `${fmtRs(c.rsHora)}/h &nbsp;·&nbsp; ${fmtRs(c.rsDia)}/dia &nbsp;·&nbsp; ${fmtRs(c.rsMes)}/mês &nbsp;·&nbsp; ${c.kw.toFixed(1)} kW equivalentes &nbsp;·&nbsp; ${c.equipamentos} equipamentos com desvio`;})()}
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">📈</span> Importar Série Temporal (30/90 dias)
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6">
        Importe CSV com histórico agregado por dia/hora para visualizar tendências.
        Formatos aceitos:
        <br><strong style="color:var(--text)">Long:</strong> <code style="background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:11px">Timestamp, EquipId, VarName, Value</code>
        <br><strong style="color:var(--text)">Wide:</strong> <code style="background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:11px">Timestamp, F1319 - Corrente Atual, F1320 - Corrente Atual, ...</code>
      </p>
      <div style="display:flex;gap:20px;margin-bottom:14px;padding:10px 14px;background:var(--bg2);border-radius:8px;flex-wrap:wrap">
        <div style="flex:1;min-width:140px">
          <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px">Equipamentos c/ histórico</div>
          <div class="mono" style="font-size:18px;font-weight:700;color:${Object.keys(tagHistory).length>0?'var(--cyan)':'var(--muted)'}">${Object.keys(tagHistory).length}</div>
        </div>
        <div style="flex:1;min-width:140px">
          <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px">Pontos carregados</div>
          <div class="mono" style="font-size:18px;font-weight:700;color:${tsImportHistory.length>0?'var(--cyan)':'var(--muted)'}">${tsImportHistory.reduce((s,x)=>s+(x.points||0),0)}</div>
        </div>
        <div style="flex:1;min-width:140px">
          <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px">CSVs processados</div>
          <div class="mono" style="font-size:18px;font-weight:700;color:${tsImportHistory.length>0?'var(--cyan)':'var(--muted)'}">${tsImportHistory.length}</div>
        </div>
      </div>
      <div class="import-zone" id="dropZoneTS" onclick="document.getElementById('csvInputTS').click()" style="border-color:var(--cyan);background:rgba(6,182,212,0.04)">
        <div style="font-size:32px;color:var(--cyan);margin-bottom:8px">📊</div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">Arraste CSV com série temporal aqui</div>
        <div class="import-info">Long ou Wide · UTF-8 · separador vírgula</div>
        <input type="file" id="csvInputTS" accept=".csv" style="display:none" multiple>
      </div>
      <div id="importResultTS"></div>
      <details style="margin-top:12px">
        <summary style="cursor:pointer;font-size:11px;color:var(--accent)">📋 Exemplo de query KQL para exportar série temporal diária</summary>
        <pre style="margin-top:8px;padding:12px;background:var(--bg2);border-radius:6px;font-size:10px;color:var(--text);overflow-x:auto">YourTable
| where Timestamp &gt; ago(90d)
| where Tag in ("F1319 - Corrente Atual", "F1320 - Corrente Atual")
| summarize Value = avg(Value) by bin(Timestamp, 1d), Tag
| order by Timestamp asc
| project Timestamp, Tag, Value</pre>
      </details>
    </div>
    <div class="card">
      <div class="card-title">Importar Dados do Kusto/ADX</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">
        Exporte seu CSV do Azure Data Explorer (Kusto) no formato pivot e arraste aqui.<br>
        O parser detecta automaticamente as colunas <code style="background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:11px">SiteId, MachineId, DATA_CORRIGIDA</code> + tags como colunas.
      </p>
      <div class="import-zone" id="dropZone" onclick="document.getElementById('csvInput').click()">
        <div style="font-size:32px;color:var(--accent);margin-bottom:8px">📂</div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">Arraste o CSV aqui ou clique para selecionar</div>
        <div class="import-info">Formato: CSV exportado do Kusto/ADX (pivot format)</div>
        <input type="file" id="csvInput" accept=".csv" style="display:none" multiple>
      </div>
      <div id="importResult"></div>
    </div>
    <div class="card">
      <div class="card-title">Como Exportar do Kusto/ADX</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.8">
        <strong style="color:var(--text)">1.</strong> Abra o Azure Data Explorer → banco <code style="background:var(--bg2);padding:2px 6px;border-radius:4px">dfdataviewer</code><br>
        <strong style="color:var(--text)">2.</strong> Execute sua query KQL com <code style="background:var(--bg2);padding:2px 6px;border-radius:4px">pivot(Tag, max(Value))</code><br>
        <strong style="color:var(--text)">3.</strong> Clique em <strong style="color:var(--accent)">Export → To CSV</strong><br>
        <strong style="color:var(--text)">4.</strong> Arraste o arquivo <code style="background:var(--bg2);padding:2px 6px;border-radius:4px">export.csv</code> na zona acima<br>
        <strong style="color:var(--text)">5.</strong> Os dados serão processados e integrados ao dashboard automaticamente<br><br>
        <strong style="color:var(--yellow)">Dica:</strong> Você pode importar múltiplos CSVs (ex: um para Caldeira, outro para Bombas). Cada importação adiciona ou atualiza os equipamentos existentes.
      </div>
    </div>
    <div class="card">
      <div class="card-title">Como Usar em Outro PC</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.8">
        <strong style="color:var(--text)">1.</strong> Copie este arquivo <code style="background:var(--bg2);padding:2px 6px;border-radius:4px">dashboard_indaiatuba.html</code> para um pendrive ou rede<br>
        <strong style="color:var(--text)">2.</strong> Abra com Chrome, Edge ou Firefox — <strong style="color:var(--green)">não precisa instalar nada</strong><br>
        <strong style="color:var(--text)">3.</strong> Importe novos CSVs pela aba "Importar CSV"<br>
        <strong style="color:var(--text)">4.</strong> Os dados são processados localmente no navegador (nada vai para a internet)<br><br>
        <strong style="color:var(--cyan)">Nota:</strong> Os dados desta sessão atual ficam na memória do navegador. Para persistir, exporte novamente do Kusto a cada análise.
      </div>
    </div>
  `;
}

// MODAL — Equipment Detail
// ═══════════════════════════════════════════════════════════════════
function openModal(id){
  const e=EQUIPMENT[id]; if(!e) return;
  const a=getEquipAnalysis(id);
  const analogTags=e.tags.filter(t=>t.type==='analog');
  const rawTags=e.tags.filter(t=>t.type==='raw');
  const statusTags=e.tags.filter(t=>t.type==='bool'||t.type==='status');

  let html=`<div class="modal-header"><div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span class="mono" style="font-size:14px;font-weight:700;color:var(--accent);background:rgba(59,130,246,0.1);padding:3px 10px;border-radius:6px">${esc(e.id)}</span>
      <span class="equip-status" style="background:${e.status==='Operando'?'var(--green)':'var(--yellow)'}22;color:${e.status==='Operando'?'var(--green)':'var(--yellow)'}">${esc(e.status)}</span>
    </div>
    <div style="font-size:18px;font-weight:600">${esc(e.name)}</div>
    <div style="font-size:11px;color:var(--dim);margin-top:4px">${esc(e.area)} · ${esc(e.type)} · PLC: ${esc(e.plc)}</div>
  </div><button class="modal-close" onclick="closeModal()">✕</button></div>`;

  // KPI bar
  html+=`<div class="modal-kpis">`;
  if(a&&a.primaryTag){
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Valor Atual</div><div class="modal-kpi-value mono">${fmt(a.primaryTag.value)}<span style="font-size:10px;color:var(--dim);margin-left:3px">${a.primaryTag.unit}</span></div></div>`;
  }
  if(a&&a.nomVal!==null&&a.nomVal!==undefined){
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Nominal</div><div class="modal-kpi-value mono" style="color:var(--accent)">${fmt(a.nomVal)}<span style="font-size:10px;color:var(--dim);margin-left:3px">${a.primaryTag?a.primaryTag.unit:''}</span></div></div>`;
  }
  if(a&&a.desvio!==null){
    const col=sColor(a.desvio);
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Desvio</div><div class="modal-kpi-value mono" style="color:${col}">${a.desvio>0?'+':''}${fmt(a.desvio)}%</div></div>`;
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">IDE</div><div class="modal-kpi-value mono" style="color:${a.ide>1.1?'var(--red)':a.ide>1.05?'var(--yellow)':'var(--green)'}">${a.ide.toFixed(3)}</div></div>`;
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Status</div><div style="margin-top:6px"><span class="equip-status" style="font-size:14px;padding:4px 12px;background:${col}18;color:${col}">${sLabel(a.desvio)}</span></div></div>`;
  }
  html+=`</div>`;

  // Explanation box
  html+=`<div style="margin:0 20px;padding:10px 14px;background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.15);border-radius:8px;cursor:pointer" onclick="const el=this.querySelector('.explain-body');el.style.display=el.style.display==='none'?'block':'none';this.querySelector('.explain-arrow').textContent=el.style.display==='none'?'▶':'▼'">
    <div style="display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--accent)">
      <span class="explain-arrow">▶</span> Como interpretar os valores?
    </div>
    <div class="explain-body" style="display:none;margin-top:10px;font-size:10px;line-height:1.8;color:var(--muted)">
      <div><b style="color:var(--text)">Valor Atual</b> — Leitura média do sensor principal no período analisado. É o valor real medido em campo.</div>
      <div><b style="color:var(--accent)">Nominal</b> — Valor de referência de projeto ou catálogo. Representa a condição ideal de operação.</div>
      <div><b style="color:var(--text)">Desvio %</b> — Diferença percentual: (Atual − Nominal) / Nominal × 100. <span style="color:var(--green)">Verde ≤5%</span> · <span style="color:var(--yellow)">Amarelo 5-10%</span> · <span style="color:var(--orange)">Laranja 10-15%</span> · <span style="color:var(--red)">Vermelho &gt;15%</span></div>
      <div><b style="color:var(--text)">IDE</b> — Índice de Degradação Energética = Atual / Nominal. Valores acima de 1.0 indicam sobreconsumo; abaixo de 1.0 indicam suboperação.</div>
      <div><b style="color:var(--text)">CV%</b> — Coeficiente de Variação = Desvio Padrão / Média × 100. Mede a estabilidade do sinal. CV &gt;30% indica instabilidade.</div>
      <div><b style="color:var(--text)">Std</b> — Desvio padrão da medição. Quanto maior, mais o sinal oscila em torno da média.</div>
      <div><b style="color:var(--text)">Amostras (n)</b> — Quantidade de leituras coletadas no período. Mais amostras = maior confiança na média.</div>
    </div>
  </div>`;

  html+=`<div class="modal-body">`;

  // Custo financeiro do desvio (se aplicável)
  const custoEq=calcCustoDesvio(id);
  if(custoEq && custoEq.rsHora>0){
    html+=`<div class="analysis-box" style="border-left:3px solid var(--red);background:rgba(239,68,68,0.05)">
      <div style="font-size:11px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">💰 Impacto Financeiro Estimado</div>
      <div class="analysis-grid">
        <div class="analysis-item"><div class="analysis-label">R$ / hora</div><div class="analysis-value mono" style="color:var(--red)">${fmtRs(custoEq.rsHora)}</div><div class="analysis-sub">${esc(custoEq.obs||'')}</div></div>
        <div class="analysis-item"><div class="analysis-label">R$ / dia</div><div class="analysis-value mono" style="color:var(--orange)">${fmtRs(custoEq.rsDia)}</div><div class="analysis-sub">${COST_PARAMS.horasDia}h operação</div></div>
        <div class="analysis-item"><div class="analysis-label">R$ / mês</div><div class="analysis-value mono" style="color:var(--yellow)">${fmtRs(custoEq.rsMes)}</div><div class="analysis-sub">30 dias</div></div>
        ${custoEq.kwPerdido>0?`<div class="analysis-item"><div class="analysis-label">Equivalente</div><div class="analysis-value mono" style="color:var(--cyan)">${custoEq.kwPerdido.toFixed(1)} kW</div><div class="analysis-sub">V=${COST_PARAMS.tensao}V · FP=${COST_PARAMS.fatorPotencia}</div></div>`:''}
      </div>
    </div>`;
  }

  // Histórico temporal (se importado)
  const histKeys=tagHistory[id]?Object.keys(tagHistory[id]):[];
  if(histKeys.length>0){
    html+=`<div class="analysis-box" style="border-left:3px solid var(--cyan)">
      <div style="font-size:11px;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">📈 Tendência Histórica</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px">`;
    histKeys.slice(0,6).forEach(vn=>{
      const p30=getHistorySlice(id,vn,30);
      const p90=getHistorySlice(id,vn,90);
      const series=p90.length>0?p90:p30;
      if(series.length<2) return;
      html+=`<div style="padding:10px;background:var(--bg2);border-radius:6px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:600">${esc(vn)}</div>
        ${renderSparkline(series,200,40,'var(--cyan)')}
        <div style="font-size:9px;color:var(--dim);margin-top:4px">30d: ${p30.length} pts · 90d: ${p90.length} pts</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Analog tags table
  if(analogTags.length>0){
    html+=`<div style="margin-bottom:16px"><div class="tag-section-title" style="color:var(--green)"><span>◉</span> Sinais Analógicos Convertidos (${analogTags.length})</div>
    <table><thead><tr><th>Variável</th><th style="text-align:right">Valor</th><th style="text-align:right">Mín</th><th style="text-align:right">Máx</th><th style="text-align:right">Std</th><th style="text-align:right">Unid.</th><th style="text-align:right">Amostras</th></tr></thead><tbody>`;
    analogTags.forEach((t,i)=>{
      html+=`<tr style="${i%2?'background:rgba(255,255,255,0.015)':''}">
        <td style="font-weight:500">${esc(t.var)}</td>
        <td class="mono" style="text-align:right;font-weight:700;font-size:12px">${fmt(t.value,2)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.min,2)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.max,2)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.std,2)}</td>
        <td style="text-align:right;color:var(--muted);font-size:10px">${esc(t.unit)}</td>
        <td class="mono" style="text-align:right;color:var(--muted);font-size:10px">${t.n}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // Range visualization
  if(analogTags.filter(t=>t.unit).length>1){
    const maxV=Math.max(...analogTags.filter(t=>t.unit).map(t=>Math.max(Math.abs(t.max),Math.abs(t.value))));
    html+=`<div class="analysis-box"><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Faixa Operacional</div><div class="range-vis">`;
    analogTags.filter(t=>t.unit).forEach(t=>{
      const absMax=maxV*1.1||1;
      const left=(Math.min(t.min,0)+absMax)/(absMax*2)*100;
      const w=(t.max-t.min)/(absMax*2)*100;
      const marker=(t.value+absMax)/(absMax*2)*100;
      html+=`<div class="range-row">
        <div class="range-label mono">${esc(t.var.substring(0,18))}</div>
        <div class="range-track">
          <div class="range-bar" style="left:${Math.max(0,left)}%;width:${Math.min(100,w)}%;background:linear-gradient(90deg,var(--accent)88,var(--accent))"></div>
          <div class="range-marker" style="left:${Math.max(0,Math.min(100,marker))}%"></div>
        </div>
        <div class="range-value mono">${fmt(t.value)} ${t.unit}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Tendência temporal — gráfico por variável analógica (24h sintético baseado em value/std/nominal)
  const trendTags=analogTags.filter(t=>t.unit&&t.type==='analog');
  if(trendTags.length>0){
    html+=`<div class="analysis-box"><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Tendência Temporal — Últimas 24h</div>`;
    trendTags.forEach((t,idx)=>{
      const series=buildTrendSeries(id+'_'+t.var,t.value,t.std,24);
      const nomVal=(a&&a.primaryTag&&a.primaryTag.var===t.var)?a.nomVal:null;
      const first=series[0],last=series[series.length-1];
      const delta=first!==0?((last-first)/Math.abs(first))*100:0;
      const dcol=delta>0.5?'var(--red)':delta<-0.5?'var(--green)':'var(--dim)';
      html+=`<div style="margin-bottom:${idx<trendTags.length-1?'14px':'0'};padding:12px;background:var(--card2);border-radius:10px;border:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text)">${esc(t.var)}</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">
              <span class="mono" style="color:var(--text);font-weight:600">${fmt(t.value)} ${esc(t.unit)}</span>
              ${nomVal!==null&&nomVal!==undefined?` · nominal <span class="mono" style="color:var(--accent)">${fmt(nomVal)} ${esc(t.unit)}</span>`:''}
              · min ${fmt(t.min)} · max ${fmt(t.max)} · σ ${fmt(t.std,2)}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:10px;color:var(--dim);font-weight:600;letter-spacing:0.3px">Δ 24H</div>
            <div style="font-size:13px;font-weight:700;color:${dcol}" class="mono">${delta>=0?'+':''}${delta.toFixed(2)}%</div>
          </div>
        </div>
        ${buildTagTrendChart(series,{nominal:nomVal,min:t.min,max:t.max,unit:t.unit})}
      </div>`;
    });
    html+=`</div>`;
  }

  // Raw tags
  if(rawTags.length>0){
    html+=`<div style="margin-bottom:16px"><div class="tag-section-title" style="color:var(--yellow)"><span>◈</span> Sinais Raw / Não Convertidos (${rawTags.length})</div>
    <table><thead><tr><th>Variável</th><th style="text-align:right">Valor</th><th style="text-align:right">Mín</th><th style="text-align:right">Máx</th><th style="text-align:right">Std</th><th style="text-align:right">Amostras</th></tr></thead><tbody>`;
    rawTags.forEach(t=>{
      html+=`<tr><td style="color:var(--yellow)">${esc(t.var)}</td>
        <td class="mono" style="text-align:right;font-weight:600;color:rgba(245,158,11,0.8)">${fmt(t.value,0)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.min,0)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.max,0)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.std,1)}</td>
        <td class="mono" style="text-align:right;color:var(--muted);font-size:10px">${t.n}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // Status chips
  if(statusTags.length>0){
    html+=`<div style="margin-bottom:16px"><div class="tag-section-title" style="color:var(--cyan)"><span>◻</span> Status e Interlocks (${statusTags.length})</div><div class="status-chips">`;
    statusTags.forEach(t=>{
      const isOn=t.value>=0.5;
      const isMotor=t.type==='status';
      const dotColor=isMotor?(t.value===3?'var(--green)':t.value===0?'var(--red)':'var(--yellow)'):(isOn?'var(--green)':'rgba(239,68,68,0.4)');
      html+=`<div class="status-chip"><div class="status-dot" style="background:${dotColor};${isOn?'box-shadow:0 0 8px '+dotColor:''}"></div><div><div class="status-chip-label">${esc(t.var)}</div><div class="status-chip-value mono" style="color:${isMotor?'var(--text)':(isOn?'var(--green)':'var(--red)')}">${isMotor?motorLabel(t.value):(isOn?'ON':'OFF')}</div></div></div>`;
    });
    html+=`</div></div>`;
  }

  // Reliability analysis
  if(a&&a.desvio!==null){
    const col=sColor(a.desvio);
    const cvVal=a.primaryTag&&a.primaryTag.value>0?((a.primaryTag.std/a.primaryTag.value)*100):null;
    html+=`<div class="analysis-box"><div style="font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Análise de Confiabilidade / Energia</div>
    <div class="analysis-grid">
      <div class="analysis-item"><div class="analysis-label">Índice Degradação</div><div class="analysis-value mono" style="color:${a.ide>1.1?'var(--red)':a.ide>1.05?'var(--yellow)':'var(--green)'}">${a.ide?a.ide.toFixed(3):'—'}</div><div class="analysis-sub">IDE = Atual/Nominal</div></div>
      <div class="analysis-item"><div class="analysis-label">Desvio Percentual</div><div class="analysis-value mono" style="color:${col}">${a.desvio>0?'+':''}${a.desvio.toFixed(1)}%</div><div class="analysis-sub">(Atual - Nominal) / Nominal</div></div>
      <div class="analysis-item"><div class="analysis-label">Variabilidade (CV)</div><div class="analysis-value mono" style="color:${cvVal&&cvVal>30?'var(--orange)':'var(--green)'}">${cvVal?cvVal.toFixed(1):'—'}%</div><div class="analysis-sub">Coef. Variação (Std/Mean)</div></div>
    </div>
    <div class="diagnosis" style="border-left-color:${col};background:${col}11">
      ${Math.abs(a.desvio)>15?'Desvio crítico detectado. Recomenda-se inspeção imediata — verificar condição mecânica, obstrução, desbalanceamento ou degradação do acionamento.':
        Math.abs(a.desvio)>5?'Desvio moderado. Equipamento operando fora da faixa ideal — monitorar tendência. Possíveis causas: sujeira, desgaste, variação de carga.':
        'Equipamento operando dentro da faixa nominal. Sem ações corretivas necessárias no momento.'}
      ${cvVal&&cvVal>30?' Alta variabilidade indica possível instabilidade de processo ou ciclagem.':''}
    </div></div>`;
  }

  // Source info
  html+=`<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dim);padding:8px 0 0;border-top:1px solid var(--border)">
    <span>Fonte: Azure Data Explorer (Kusto) — ${esc(e.plc)}</span>
    <span>Tags: ${e.tags.length} | Amostras: ${a&&a.primaryTag?a.primaryTag.n:'—'}</span>
  </div>`;

  html+=`</div>`;

  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').style.display='flex';
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').style.display='none';
  document.body.style.overflow='';
}

// ═══════════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════
function toggleParetoDetail(safeType){
  const panel=document.getElementById('pareto-'+safeType);
  if(!panel) return;
  const row=panel.previousElementSibling;
  const isOpen=panel.classList.contains('open');
  // Close all other panels
  document.querySelectorAll('.pareto-detail.open').forEach(p=>{p.classList.remove('open');if(p.previousElementSibling)p.previousElementSibling.classList.remove('active');});
  if(!isOpen){
    panel.classList.add('open');
    if(row) row.classList.add('active');
    // Re-attach click handlers for equipment rows inside the detail
    panel.querySelectorAll('[data-equip]').forEach(el=>{
      el.onclick=()=>openModal(el.dataset.equip);
    });
  }
}

// ═══════════════════════════════════════════════════════════════════
function attachHandlers(){
  // Equipment cards click
  document.querySelectorAll('[data-equip]').forEach(el=>{
    el.addEventListener('click',()=>openModal(el.dataset.equip));
  });

  // CSV import
  const dropZone=document.getElementById('dropZone');
  const csvInput=document.getElementById('csvInput');
  if(dropZone){
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');handleFiles(e.dataTransfer.files);});
  }
  if(csvInput){
    csvInput.addEventListener('change',e=>handleFiles(e.target.files));
  }

  // Time-series CSV import
  const dropZoneTS=document.getElementById('dropZoneTS');
  const csvInputTS=document.getElementById('csvInputTS');
  if(dropZoneTS){
    dropZoneTS.addEventListener('dragover',e=>{e.preventDefault();dropZoneTS.classList.add('dragover');});
    dropZoneTS.addEventListener('dragleave',()=>dropZoneTS.classList.remove('dragover'));
    dropZoneTS.addEventListener('drop',e=>{e.preventDefault();dropZoneTS.classList.remove('dragover');handleFilesTS(e.dataTransfer.files);});
  }
  if(csvInputTS){
    csvInputTS.addEventListener('change',e=>handleFilesTS(e.target.files));
  }
}

function handleFilesTS(files){
  const resultEl=document.getElementById('importResultTS');
  if(!resultEl) return;
  let totalHTML='';
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const res=parseTimeSeriesCSV(ev.target.result);
        if(res.error){
          totalHTML+=`<div style="padding:10px;margin-top:10px;background:rgba(239,68,68,0.1);border-left:3px solid var(--red);border-radius:6px;font-size:11px;color:var(--red)">❌ ${esc(file.name)}: ${esc(res.error)}</div>`;
        } else {
          tsImportHistory.push({file:file.name,points:res.points,equipamentos:res.equipamentos,formato:res.formato});
          totalHTML+=`<div style="padding:10px;margin-top:10px;background:rgba(6,182,212,0.1);border-left:3px solid var(--cyan);border-radius:6px;font-size:11px;color:var(--cyan)">✓ ${esc(file.name)}: ${res.points} pontos em ${res.equipamentos} equipamento(s) (formato ${res.formato})</div>`;
        }
        resultEl.innerHTML=totalHTML;
        render();
      }catch(err){
        resultEl.innerHTML+=`<div style="padding:10px;margin-top:10px;background:rgba(239,68,68,0.1);border-left:3px solid var(--red);border-radius:6px;font-size:11px;color:var(--red)">❌ ${esc(file.name)}: ${esc(err.message)}</div>`;
      }
    };
    reader.readAsText(file);
  });
}

function handleFiles(files){
  const resultEl=document.getElementById('importResult');
  if(!resultEl) return;
  let totalHTML='';

  Array.from(files).forEach(file=>{
    if(!file.name.endsWith('.csv')){
      totalHTML+=`<div class="import-status" style="background:var(--red)22;color:var(--red)">Arquivo "${file.name}" não é CSV</div>`;
      return;
    }
    const reader=new FileReader();
    reader.onload=function(e){
      const parsed=parseKustoCSV(e.target.result);
      if(parsed.error){
        totalHTML+=`<div class="import-status" style="background:var(--red)22;color:var(--red)">Erro: ${parsed.error}</div>`;
      } else {
        const merge=mergeImportedData(parsed);
        const dateStr=parsed.date||'N/A';
        importHistory.push({file:file.name,date:dateStr,rows:parsed.rowCount,new:merge.newCount,updated:merge.updatedCount});
        document.getElementById('headerDate').textContent=dateStr;
        totalHTML+=`<div style="background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border);margin-top:12px">
          <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px">✓ ${file.name} importado com sucesso</div>
          <div style="font-size:11px;color:var(--muted);line-height:1.8">
            Linhas processadas: <strong style="color:var(--text)">${parsed.rowCount}</strong><br>
            Tags encontradas: <strong style="color:var(--text)">${parsed.tagCount}</strong><br>
            Equipamentos atualizados: <strong style="color:var(--accent)">${merge.updatedCount}</strong><br>
            Equipamentos novos: <strong style="color:var(--cyan)">${merge.newCount}</strong><br>
            Data coleta: <strong style="color:var(--text)">${dateStr}</strong>
          </div>
        </div>`;
        resultEl.innerHTML=totalHTML;
      }
    };
    reader.readAsText(file);
  });
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
