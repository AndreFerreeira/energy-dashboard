<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Energy Optimization — Planta Indaiatuba</title>
<style>
:root {
  --bg:#06090f; --bg2:#0a0e17; --card:#111827; --card2:#0f1729;
  --border:#1e293b; --border2:#293548; --accent:#3b82f6; --green:#10b981;
  --yellow:#f59e0b; --orange:#f97316; --red:#ef4444; --purple:#8b5cf6;
  --cyan:#06b6d4; --pink:#ec4899; --text:#f1f5f9; --muted:#94a3b8; --dim:#64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; }
.mono { font-family:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace; }

/* HEADER */
.header { border-bottom:1px solid var(--border); padding:12px 28px; display:flex; justify-content:space-between; align-items:center; background:var(--bg2); }
.header-left { display:flex; align-items:center; gap:10px; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green), 0 0 20px rgba(16,185,129,0.3); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.header-title { font-size:15px; font-weight:700; letter-spacing:1px; }
.header-badge { font-size:10px; color:var(--dim); margin-left:8px; padding:2px 8px; background:rgba(59,130,246,0.1); border-radius:4px; }
.header-right { display:flex; gap:16px; align-items:center; font-size:9px; color:var(--dim); }
.header-date { background:var(--card); padding:3px 10px; border-radius:4px; color:var(--muted); }

/* TABS */
.tabs { border-bottom:1px solid var(--border); padding:0 28px; display:flex; background:var(--bg2); overflow-x:auto; }
.tab-btn { padding:10px 20px; font-size:12px; font-weight:400; color:var(--dim); background:none; border:none; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; font-family:inherit; white-space:nowrap; }
.tab-btn.active { color:var(--accent); font-weight:600; border-bottom-color:var(--accent); }
.tab-btn:hover { color:var(--muted); }

/* CONTENT */
.content { padding:20px 28px; max-width:1200px; margin:0 auto; }

/* KPI GRID */
.kpi-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px; }
.kpi { background:var(--card); border-radius:10px; padding:14px 16px; position:relative; overflow:hidden; border:1px solid var(--border); }
.kpi-bar { position:absolute; top:0; left:0; right:0; height:2px; }
.kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.kpi-value { font-size:22px; font-weight:700; margin-top:4px; }
.kpi-sub { font-size:9px; color:var(--dim); margin-top:2px; }

/* CARDS */
.card { background:var(--card); border-radius:10px; padding:18px; border:1px solid var(--border); margin-bottom:14px; }
.card-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; }

/* EQUIPMENT GRID */
.equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.section-title { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; padding-left:4px; }

/* EQUIPMENT CARD */
.equip-card { background:var(--card); border-radius:10px; padding:14px 16px; border:1px solid var(--border); cursor:pointer; position:relative; overflow:hidden; transition:all .15s; border-left:3px solid var(--dim); }
.equip-card:hover { border-color:var(--accent); background:var(--card2); }
.equip-header { display:flex; justify-content:space-between; align-items:flex-start; }
.equip-id { font-size:11px; font-weight:700; color:var(--accent); }
.equip-status { font-size:9px; font-weight:600; padding:1px 6px; border-radius:3px; }
.equip-name { font-size:12px; font-weight:600; color:var(--text); margin:2px 0; }
.equip-area { font-size:9px; color:var(--dim); }
.equip-value { font-size:18px; font-weight:700; line-height:1; text-align:right; }
.equip-unit { font-size:9px; color:var(--dim); margin-left:2px; }
.equip-desvio { font-size:11px; font-weight:600; margin-top:2px; text-align:right; }
.equip-footer { display:flex; justify-content:space-between; margin-top:8px; padding-top:6px; border-top:1px solid rgba(30,41,59,0.3); font-size:9px; }
.equip-footer-left { color:var(--dim); }
.equip-footer-right { color:var(--accent); font-weight:600; }

/* TABLE */
table { width:100%; border-collapse:collapse; }
th { padding:6px 8px; color:var(--dim); font-weight:500; font-size:9px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); }
td { padding:7px 8px; font-size:11px; border-bottom:1px solid rgba(30,41,59,0.15); }
tr:hover { background:rgba(59,130,246,0.06); }
tr.clickable { cursor:pointer; }

/* MODAL */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); z-index:1000; display:flex; justify-content:center; align-items:flex-start; padding:30px 20px; overflow:auto; }
.modal { background:linear-gradient(135deg,rgba(17,24,39,0.97),rgba(15,23,41,0.95)); backdrop-filter:blur(12px); border-radius:16px; border:1px solid var(--border2); max-width:900px; width:100%; color:var(--text); position:relative; }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; }
.modal-close { background:none; border:none; color:var(--dim); font-size:20px; cursor:pointer; padding:4px 8px; line-height:1; }
.modal-close:hover { color:var(--text); }
.modal-kpis { display:flex; gap:1px; background:var(--border); }
.modal-kpi { flex:1; background:var(--card2); padding:12px 16px; text-align:center; }
.modal-kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.modal-kpi-value { font-size:22px; font-weight:700; margin-top:4px; }
.modal-body { padding:16px 24px 20px; }

/* TAG SECTION */
.tag-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }

/* STATUS CHIPS */
.status-chips { display:flex; flex-wrap:wrap; gap:8px; }
.status-chip { background:var(--bg2); border-radius:8px; padding:8px 14px; border:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.status-dot { width:8px; height:8px; border-radius:50%; }
.status-chip-label { font-size:10px; color:var(--muted); }
.status-chip-value { font-size:11px; font-weight:600; }

/* ANALYSIS BOX */
.analysis-box { background:var(--bg2); border-radius:10px; padding:16px; border:1px solid var(--border); margin-bottom:16px; }
.analysis-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.analysis-item { background:var(--card); border-radius:8px; padding:12px; text-align:center; }
.analysis-label { font-size:9px; color:var(--dim); text-transform:uppercase; }
.analysis-value { font-size:18px; font-weight:700; margin-top:4px; }
.analysis-sub { font-size:9px; color:var(--dim); }
.diagnosis { margin-top:12px; padding:10px 14px; border-radius:8px; border-left:3px solid; font-size:11px; line-height:1.5; }

/* ALERT CARD */
.alert-card { background:var(--card); border-radius:10px; padding:16px; border-left:4px solid; cursor:pointer; margin-bottom:10px; transition:background .15s; }
.alert-card:hover { background:var(--card2); }

/* REC CARD */
.rec-card { background:var(--card); border-radius:8px; padding:14px; border-left:3px solid; display:flex; gap:12px; align-items:center; border:1px solid var(--border); margin-bottom:8px; }
.rec-pri { font-size:10px; font-weight:700; min-width:44px; }
.rec-text { font-size:11px; color:var(--text); line-height:1.4; }

/* CHART BAR */
.bar-chart { display:flex; flex-direction:column; gap:6px; }
.bar-row { display:flex; align-items:center; gap:10px; }
.bar-label { font-size:10px; color:var(--muted); width:100px; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:20px; background:var(--bg); border-radius:4px; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width .5s; position:absolute; }
.bar-nom { height:100%; width:2px; background:var(--accent); position:absolute; top:0; opacity:0.6; }
.bar-val-label { font-size:10px; width:55px; text-align:right; flex-shrink:0; }

/* CSV IMPORT */
.import-zone { border:2px dashed var(--border2); border-radius:12px; padding:20px; text-align:center; cursor:pointer; transition:all .2s; margin-bottom:14px; }
.import-zone:hover { border-color:var(--accent); background:rgba(59,130,246,0.05); }
.import-zone.dragover { border-color:var(--green); background:rgba(16,185,129,0.08); }
.import-btn { background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; margin-top:8px; }
.import-btn:hover { background:#2563eb; }
.import-info { font-size:10px; color:var(--dim); margin-top:6px; }
.import-status { font-size:11px; margin-top:8px; padding:6px 12px; border-radius:6px; display:inline-block; }

/* RANGE VIS */
.range-vis { display:flex; flex-direction:column; gap:8px; padding-top:8px; }
.range-row { display:flex; align-items:center; gap:10px; }
.range-label { font-size:10px; color:var(--muted); width:90px; text-align:right; }
.range-track { flex:1; height:20px; background:var(--bg); border-radius:4px; position:relative; }
.range-bar { position:absolute; height:100%; border-radius:4px; }
.range-marker { position:absolute; top:-2px; width:2px; height:24px; background:var(--text); border-radius:1px; }
.range-value { font-size:10px; width:50px; text-align:right; }

/* GAUGE & TANK */
.gauge { text-align:center; flex:1; }
.gauge-tank { width:70px; background:var(--bg); border-radius:8px; height:160px; position:relative; overflow:hidden; margin:0 auto; border:1px solid var(--border); }
.gauge-fill { position:absolute; bottom:0; width:100%; border-radius:0 0 8px 8px; transition:height .5s; }
.gauge-label { font-size:11px; color:var(--muted); margin-bottom:8px; }
.gauge-value { font-size:20px; font-weight:700; margin-top:8px; }
.gauge-sub { font-size:10px; color:var(--dim); }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.temp-display { text-align:center; padding:20px; }
.temp-value { font-size:48px; font-weight:700; }
.temp-sub { font-size:12px; color:var(--muted); margin-top:4px; }

@media (max-width:900px) {
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  .equip-grid { grid-template-columns:repeat(2,1fr); }
  .analysis-grid { grid-template-columns:1fr; }
  .grid-2 { grid-template-columns:1fr; }
  .grid-3 { grid-template-columns:1fr; }
}
@media (max-width:600px) {
  .kpi-grid { grid-template-columns:1fr; }
  .equip-grid { grid-template-columns:1fr; }
  .content { padding:12px 14px; }
}
</style>
</head>

// UTILITIES
// ═══════════════════════════════════════════════════════════════════
function desvio(atual,nom){ return nom ? ((atual-nom)/nom*100) : null; }
function sColor(d){ return d===null?'var(--dim)':Math.abs(d)>15?'var(--red)':Math.abs(d)>10?'var(--orange)':Math.abs(d)>5?'var(--yellow)':'var(--green)'; }
function sLabel(d){ return d===null?'N/A':Math.abs(d)>15?'CRITICO':Math.abs(d)>10?'ALERTA':Math.abs(d)>5?'ATENÇÃO':'NORMAL'; }
function fmt(n,dec=1){ return n===null||n===undefined?'—':typeof n==='number'?(Number.isInteger(n)?n.toString():n.toFixed(dec)):n; }
function motorLabel(v){ return v===3?'Operando':v===0?'Parado':v===5?'Falha':`Status ${v}`; }
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function getEquipAnalysis(id){
  const e=EQUIPMENT[id]; if(!e) return null;
  const pt=e.tags.find(t=>t.type==='analog');
  const nk=Object.keys(e.nominal)[0];
  const nv=e.nominal[nk];
  const d=pt&&nv?desvio(pt.value,nv):null;
  const ide=pt&&nv?pt.value/nv:null;
  const cv=pt&&pt.value>0?(pt.std/pt.value*100):null;
  return {primaryTag:pt,nomKey:nk,nomVal:nv,desvio:d,ide,cv};
}

// ═══════════════════════════════════════════════════════════════════
// CSV PARSER — Kusto/ADX pivot format
// ═══════════════════════════════════════════════════════════════════
function parseKustoCSV(csvText){
  const lines=csvText.split('\n').filter(l=>l.trim());
  if(lines.length<2) return {error:'CSV vazio ou inválido'};
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));

  // Detect Kusto format
  const hasKustoCols = headers.includes('SiteId') || headers.includes('MachineId') || headers.includes('DATA_CORRIGIDA');
  const metaCols = ['SiteId','MachineId','DATA_CORRIGIDA','Timestamp'];
  const tagCols = headers.filter(h=>!metaCols.includes(h));

  // Parse rows
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=lines[i].split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    if(vals.length<headers.length) continue;
    const row={};
    headers.forEach((h,j)=>row[h]=vals[j]);
    rows.push(row);
  }

  // Compute stats per tag
  const results={};
  let dateStr='';
  if(rows.length>0&&rows[0].DATA_CORRIGIDA) dateStr=rows[0].DATA_CORRIGIDA;

  tagCols.forEach(col=>{
    const vals=rows.map(r=>parseFloat(r[col])).filter(v=>!isNaN(v));
    if(vals.length===0) return;
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const min=Math.min(...vals);
    const max=Math.max(...vals);
    const std=vals.length>1?Math.sqrt(vals.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/(vals.length-1)):0;

    // Extract equipment ID from tag name
    const parts=col.split('.');
    const tagShort=parts[parts.length-1]||col;
    const equipId=(tagShort.split(' - ')[0]||'').trim();
    const varName=(tagShort.split(' - ').slice(1).join(' - ')||tagShort).trim();

    // Classify type
    let type='analog';
    if(vals.length<=5 && (max===0||max===1)) type='bool';
    else if(vals.length<=5 && (max===3||max===4||max===5)) type='status';
    else if(max>1000 && !varName.toLowerCase().includes('convert')) type='raw';

    // Detect unit from var name
    let unit='';
    if(/corrente|current/i.test(varName)&&type==='analog') unit='A';
    if(/velocidade|speed|rpm/i.test(varName)) unit=varName.toLowerCase().includes('rpm')?'RPM':'%';
    if(/temperatura|temp/i.test(varName)) unit='°C';
    if(/pressao|press/i.test(varName)) unit='mmH₂O';
    if(/vazao|flow/i.test(varName)) unit='T/H';
    if(/vibra/i.test(varName)) unit='raw';

    if(!results[equipId]) results[equipId]={id:equipId,tags:[]};
    results[equipId].tags.push({var:varName,value:Math.round(mean*100)/100,min:Math.round(min*100)/100,max:Math.round(max*100)/100,std:Math.round(std*100)/100,unit,n:vals.length,type});
  });

  return {equipment:results,rowCount:rows.length,tagCount:tagCols.length,date:dateStr};
}

function mergeImportedData(parsed){
  let newCount=0, updatedCount=0;
  Object.entries(parsed.equipment).forEach(([eqId,eqData])=>{
    // Try to find matching equipment in EQUIPMENT
    let matchKey = Object.keys(EQUIPMENT).find(k=>k===eqId||EQUIPMENT[k].id===eqId);
    if(matchKey){
      // Update existing: replace tags with analog data > threshold
      const newAnalog = eqData.tags.filter(t=>t.type==='analog'&&t.n>2);
      if(newAnalog.length>0){
        const existing=EQUIPMENT[matchKey];
        newAnalog.forEach(nt=>{
          const idx=existing.tags.findIndex(t=>t.var.includes(nt.var.substring(0,15))||nt.var.includes(t.var.substring(0,15)));
          if(idx>=0){
            existing.tags[idx]={...existing.tags[idx],...nt};
          } else {
            existing.tags.push(nt);
          }
        });
        updatedCount++;
      }
    } else if(eqData.tags.filter(t=>t.type==='analog'&&t.n>2).length>0){
      // Add new equipment
      const analogTags=eqData.tags.filter(t=>t.n>2);
      EQUIPMENT[eqId]={
        id:eqId, name:eqId.replace(/_/g,' '), area:'Importado CSV', type:'Importado',
        plc:'CSV', status:'Importado', nominal:{},
        tags:analogTags,
      };
      newCount++;
    }
  });
  return {newCount,updatedCount};
}

let currentTab='overview';

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  render();
}

function render(){
  const el=document.getElementById('content');
  switch(currentTab){
    case 'overview': el.innerHTML=renderOverview(); break;
    case 'caldeira': el.innerHTML=renderCaldeira(); break;
    case 'ventiladores': el.innerHTML=renderVentiladores(); break;
    case 'bombas': el.innerHTML=renderBombas(); break;
    case 'analysis': el.innerHTML=renderAnalysis(); break;
    case 'alerts': el.innerHTML=renderAlerts(); break;
    case 'import': el.innerHTML=renderImport(); break;
  }
  attachHandlers();
}

function renderOverview(){
  const ids=Object.keys(EQUIPMENT);
  const vents=ids.filter(k=>EQUIPMENT[k].type==='Ventilador');
  const bombas=ids.filter(k=>EQUIPMENT[k].type==='Bomba');
  const temps=ids.filter(k=>EQUIPMENT[k].type==='Temperatura');
  const press=ids.filter(k=>EQUIPMENT[k].type==='Pressão');
  const outros=ids.filter(k=>!['Ventilador','Bomba','Temperatura','Pressão'].includes(EQUIPMENT[k].type));

  const analyses=ids.map(k=>{const a=getEquipAnalysis(k);return a?{id:k,...a}:null;}).filter(Boolean);
  const critCount=analyses.filter(x=>x.desvio!==null&&Math.abs(x.desvio)>10).length;
  const okCount=analyses.filter(x=>x.desvio!==null&&Math.abs(x.desvio)<=5).length;
  const fornalha=EQUIPMENT.TT13640?EQUIPMENT.TT13640.tags[0]:null;

  // Fan chart data
  const fanData=vents.filter(k=>{const t=EQUIPMENT[k].tags.find(t=>t.var.includes('Corrente Atual'));return t&&t.value>20;})
    .map(k=>{const e=EQUIPMENT[k];const t=e.tags.find(t=>t.var.includes('Corrente Atual'));return{id:e.id,name:e.name,atual:t.value,nominal:e.nominal.corrente||0};});

  let html=`<div class="kpi-grid">`;
  [{icon:'⚡',label:'Equipamentos',value:ids.length,color:'var(--accent)',sub:`${vents.length} vent. · ${bombas.length} bombas`},
   {icon:'◉',label:'Tags Monitoradas',value:'3.371',color:'var(--cyan)',sub:'2935 caldeira · 436 spray'},
   {icon:'🌡',label:'Fornalha',value:fornalha?fmt(fornalha.value)+'°C':'—',color:'var(--orange)',sub:'Nominal: 950°C'},
   {icon:'✓',label:'Normais',value:okCount,color:'var(--green)',sub:`de ${analyses.length} analisados`},
   {icon:'⚠',label:'Alertas',value:critCount,color:critCount>0?'var(--red)':'var(--green)',sub:'Desvio > 10%'},
  ].forEach(k=>{
    html+=`<div class="kpi"><div class="kpi-bar" style="background:${k.color}"></div><div class="kpi-label">${k.icon} ${k.label}</div><div class="kpi-value mono">${k.value}</div><div class="kpi-sub">${k.sub}</div></div>`;
  });
  html+=`</div>`;

  // Fan bar chart (CSS bars)
  if(fanData.length>0){
    const maxVal=Math.max(...fanData.map(f=>Math.max(f.atual,f.nominal)))*1.1;
    html+=`<div class="card"><div class="card-title">Corrente Ventiladores — Nominal vs Atual (A)</div><div class="bar-chart">`;
    fanData.forEach(f=>{
      const d=desvio(f.atual,f.nominal);
      const col=sColor(d);
      html+=`<div class="bar-row">
        <div class="bar-label mono">${esc(f.id)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(f.nominal/maxVal*100)}%;background:var(--dim);opacity:0.4;border-radius:4px 0 0 4px"></div>
          <div class="bar-fill" style="width:${(f.atual/maxVal*100)}%;background:${col};opacity:0.85;border-radius:4px"></div>
          <div class="bar-nom" style="left:${(f.nominal/maxVal*100)}%"></div>
        </div>
        <div class="bar-val-label mono" style="color:${col}">${fmt(f.atual)}A</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Equipment grid by section
  [{title:'Ventiladores',ids:vents},{title:'Bombas Spray Dryer',ids:bombas},{title:'Temperaturas & Pressões',ids:[...temps,...press]},{title:'Vazão, Controle & Outros',ids:outros}].forEach(sec=>{
    if(sec.ids.length===0) return;
    html+=`<div class="section-title">${sec.title}</div><div class="equip-grid">`;
    sec.ids.forEach(id=>{ html+=renderEquipCard(id); });
    html+=`</div><div style="margin-bottom:16px"></div>`;
  });

  return html;
}

function renderEquipCard(id){
  const e=EQUIPMENT[id];
  const a=getEquipAnalysis(id);
  const col=a?sColor(a.desvio):'var(--dim)';
  const label=a?sLabel(a.desvio):'N/A';
  const analogCount=e.tags.filter(t=>t.type==='analog').length;

  return `<div class="equip-card" data-equip="${id}" style="border-left-color:${col}">
    <div class="equip-header">
      <div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span class="equip-id mono">${esc(e.id)}</span>
          <span class="equip-status" style="background:${col}22;color:${col}">${label}</span>
        </div>
        <div class="equip-name">${esc(e.name)}</div>
        <div class="equip-area">${esc(e.area)} · ${esc(e.type)}</div>
      </div>
      <div>
        ${a&&a.primaryTag?`<div class="equip-value mono">${fmt(a.primaryTag.value)}<span class="equip-unit">${a.primaryTag.unit}</span></div>`:''}
        ${a&&a.desvio!==null?`<div class="equip-desvio mono" style="color:${col}">${a.desvio>0?'+':''}${a.desvio.toFixed(1)}%</div>`:''}
      </div>
    </div>
    <div class="equip-footer">
      <span class="equip-footer-left">${analogCount} sinais · ${e.tags.length} tags</span>
      <span class="equip-footer-right">Clique para detalhes →</span>
    </div>
  </div>`;
}

function renderAnalysis(){
  const items=Object.entries(EQUIPMENT).map(([k,e])=>{
    const a=getEquipAnalysis(k);
    if(!a||a.desvio===null) return null;
    return {id:k,...e,...a};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.desvio)-Math.abs(a.desvio));

  let html=`<div class="card"><div class="card-title">Ranking — Nominal vs Atual (todos equipamentos)</div>
  <table><thead><tr>
    <th style="text-align:center">#</th><th style="text-align:center">TAG</th><th>Equipamento</th><th>Área</th>
    <th style="text-align:right">Atual</th><th style="text-align:right">Nominal</th><th style="text-align:right">Desvio</th>
    <th style="text-align:right">IDE</th><th style="text-align:right">CV%</th><th style="text-align:center">Status</th>
  </tr></thead><tbody>`;

  items.forEach((item,i)=>{
    const col=sColor(item.desvio);
    html+=`<tr class="clickable" data-equip="${item.id}" style="${i%2?'background:rgba(255,255,255,0.015)':''}">
      <td class="mono" style="text-align:center;color:var(--dim)">${i+1}</td>
      <td class="mono" style="text-align:center;color:var(--accent);font-weight:600">${esc(item.id)}</td>
      <td>${esc(item.name)}</td><td style="color:var(--dim);font-size:10px">${esc(item.area)}</td>
      <td class="mono" style="text-align:right;font-weight:600">${fmt(item.primaryTag.value)}</td>
      <td class="mono" style="text-align:right;color:var(--accent)">${fmt(item.nomVal)}</td>
      <td class="mono" style="text-align:right;font-weight:700;color:${col}">${item.desvio>0?'+':''}${item.desvio.toFixed(1)}%</td>
      <td class="mono" style="text-align:right;color:${item.ide>1.1?'var(--red)':item.ide>1.05?'var(--yellow)':'var(--green)'}">${item.ide.toFixed(3)}</td>
      <td class="mono" style="text-align:right;color:${item.cv&&item.cv>30?'var(--orange)':'var(--dim)'}">${item.cv?item.cv.toFixed(1):'—'}</td>
      <td style="text-align:center"><span class="equip-status" style="background:${col}22;color:${col}">${sLabel(item.desvio)}</span></td>
    </tr>`;
  });

  html+=`</tbody></table></div>`;

  // Bar chart
  const maxD=Math.max(...items.map(i=>Math.abs(i.desvio)))*1.2;
  html+=`<div class="card"><div class="card-title">Desvio Percentual (%) — Ordenado por Criticidade</div><div class="bar-chart">`;
  items.forEach(item=>{
    const col=sColor(item.desvio);
    const w=Math.abs(item.desvio)/maxD*100;
    const isNeg=item.desvio<0;
    html+=`<div class="bar-row" style="cursor:pointer" data-equip="${item.id}">
      <div class="bar-label mono">${esc(item.id)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${w}%;background:${col};${isNeg?'right:50%':'left:50%'};border-radius:4px"></div>
        <div style="position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--border2)"></div>
      </div>
      <div class="bar-val-label mono" style="color:${col}">${item.desvio>0?'+':''}${item.desvio.toFixed(1)}%</div>
    </div>`;
  });
  html+=`</div></div>`;

  return html;
}

function renderAlerts(){
  const items=Object.entries(EQUIPMENT).map(([k,e])=>{
    const a=getEquipAnalysis(k);
    if(!a||a.desvio===null||Math.abs(a.desvio)<=5) return null;
    return {id:k,...e,...a};
  }).filter(Boolean).sort((a,b)=>Math.abs(b.desvio)-Math.abs(a.desvio));

  let html='';
  if(items.length===0){
    html=`<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;color:var(--green)">✓</div><div style="font-size:16px;font-weight:600;color:var(--green);margin-top:8px">Nenhum alerta ativo</div></div>`;
  } else {
    items.forEach(a=>{
      const col=sColor(a.desvio);
      html+=`<div class="alert-card" data-equip="${a.id}" style="border-left-color:${col};border:1px solid ${col}22">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="mono" style="font-size:12px;color:var(--accent);font-weight:600">${esc(a.id)}</span>
              <span class="equip-status" style="background:${col}22;color:${col}">${sLabel(a.desvio)}</span>
            </div>
            <div style="font-size:12px;font-weight:500">${esc(a.name)} — ${a.primaryTag.var}: ${fmt(a.primaryTag.value)} ${a.primaryTag.unit} (nominal: ${fmt(a.nomVal)} ${a.primaryTag.unit})</div>
            <div style="font-size:10px;color:var(--dim);margin-top:2px">${esc(a.area)} · Clique para ver todas as tags</div>
          </div>
          <div style="text-align:right">
            <div class="mono" style="font-size:20px;font-weight:700;color:${col}">${a.desvio>0?'+':''}${a.desvio.toFixed(1)}%</div>
          </div>
        </div>
      </div>`;
    });
  }

  html+=`<div style="font-size:13px;font-weight:600;letter-spacing:0.5px;margin:20px 0 10px">Recomendações do Especialista</div>`;
  [{pri:'ALTA',text:'F1319/F1320 — Corrente 25-27% abaixo do nominal. Verificar se nominal está correto ou se há obstrução/desgaste.',color:'var(--red)'},
   {pri:'ALTA',text:'Expandir janela de coleta KQL para 30 dias para validar tendência.',color:'var(--red)'},
   {pri:'MÉDIA',text:'F1335 — Corrente 17A vs 130A nominal. Confirmar se opera em regime parcial.',color:'var(--orange)'},
   {pri:'MÉDIA',text:'Vibração VT13190/VT13200 em raw ADC. Calibrar para mm/s (ISO 10816).',color:'var(--orange)'},
   {pri:'MÉDIA',text:'Bombas com corrente=0 — confirmar se desligadas ou falha instrumentação.',color:'var(--orange)'},
   {pri:'BAIXA',text:'Integrar medidores kWh para Consumo Específico real por tonelada.',color:'var(--yellow)'},
   {pri:'BAIXA',text:'Adicionar tags de temperatura mancais para confiabilidade preditiva.',color:'var(--yellow)'},
  ].forEach(r=>{
    html+=`<div class="rec-card" style="border-left-color:${r.color}"><span class="rec-pri" style="color:${r.color}">${r.pri}</span><span class="rec-text">${r.text}</span></div>`;
  });

  return html;
}

// ═══════════════════════════════════════════════════════════════════
// MODAL — Equipment Detail
// ═══════════════════════════════════════════════════════════════════
function openModal(id){
  const e=EQUIPMENT[id]; if(!e) return;
  const a=getEquipAnalysis(id);
  const analogTags=e.tags.filter(t=>t.type==='analog');
  const rawTags=e.tags.filter(t=>t.type==='raw');
  const statusTags=e.tags.filter(t=>t.type==='bool'||t.type==='status');

  let html=`<div class="modal-header"><div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span class="mono" style="font-size:14px;font-weight:700;color:var(--accent);background:rgba(59,130,246,0.1);padding:3px 10px;border-radius:6px">${esc(e.id)}</span>
      <span class="equip-status" style="background:${e.status==='Operando'?'var(--green)':'var(--yellow)'}22;color:${e.status==='Operando'?'var(--green)':'var(--yellow)'}">${esc(e.status)}</span>
    </div>
    <div style="font-size:18px;font-weight:600">${esc(e.name)}</div>
    <div style="font-size:11px;color:var(--dim);margin-top:4px">${esc(e.area)} · ${esc(e.type)} · PLC: ${esc(e.plc)}</div>
  </div><button class="modal-close" onclick="closeModal()">✕</button></div>`;

  // KPI bar
  html+=`<div class="modal-kpis">`;
  if(a&&a.primaryTag){
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Valor Atual</div><div class="modal-kpi-value mono">${fmt(a.primaryTag.value)}<span style="font-size:10px;color:var(--dim);margin-left:3px">${a.primaryTag.unit}</span></div></div>`;
  }
  if(a&&a.nomVal!==null&&a.nomVal!==undefined){
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Nominal</div><div class="modal-kpi-value mono" style="color:var(--accent)">${fmt(a.nomVal)}<span style="font-size:10px;color:var(--dim);margin-left:3px">${a.primaryTag?a.primaryTag.unit:''}</span></div></div>`;
  }
  if(a&&a.desvio!==null){
    const col=sColor(a.desvio);
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Desvio</div><div class="modal-kpi-value mono" style="color:${col}">${a.desvio>0?'+':''}${fmt(a.desvio)}%</div></div>`;
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">IDE</div><div class="modal-kpi-value mono" style="color:${a.ide>1.1?'var(--red)':a.ide>1.05?'var(--yellow)':'var(--green)'}">${a.ide.toFixed(3)}</div></div>`;
    html+=`<div class="modal-kpi"><div class="modal-kpi-label">Status</div><div style="margin-top:6px"><span class="equip-status" style="font-size:14px;padding:4px 12px;background:${col}18;color:${col}">${sLabel(a.desvio)}</span></div></div>`;
  }
  html+=`</div>`;

  html+=`<div class="modal-body">`;

  // Analog tags table
  if(analogTags.length>0){
    html+=`<div style="margin-bottom:16px"><div class="tag-section-title" style="color:var(--green)"><span>◉</span> Sinais Analógicos Convertidos (${analogTags.length})</div>
    <table><thead><tr><th>Variável</th><th style="text-align:right">Valor</th><th style="text-align:right">Mín</th><th style="text-align:right">Máx</th><th style="text-align:right">Std</th><th style="text-align:right">Unid.</th><th style="text-align:right">Amostras</th></tr></thead><tbody>`;
    analogTags.forEach((t,i)=>{
      html+=`<tr style="${i%2?'background:rgba(255,255,255,0.015)':''}">
        <td style="font-weight:500">${esc(t.var)}</td>
        <td class="mono" style="text-align:right;font-weight:700;font-size:12px">${fmt(t.value,2)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.min,2)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.max,2)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.std,2)}</td>
        <td style="text-align:right;color:var(--muted);font-size:10px">${esc(t.unit)}</td>
        <td class="mono" style="text-align:right;color:var(--muted);font-size:10px">${t.n}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // Range visualization
  if(analogTags.filter(t=>t.unit).length>1){
    const maxV=Math.max(...analogTags.filter(t=>t.unit).map(t=>Math.max(Math.abs(t.max),Math.abs(t.value))));
    html+=`<div class="analysis-box"><div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Faixa Operacional</div><div class="range-vis">`;
    analogTags.filter(t=>t.unit).forEach(t=>{
      const absMax=maxV*1.1||1;
      const left=(Math.min(t.min,0)+absMax)/(absMax*2)*100;
      const w=(t.max-t.min)/(absMax*2)*100;
      const marker=(t.value+absMax)/(absMax*2)*100;
      html+=`<div class="range-row">
        <div class="range-label mono">${esc(t.var.substring(0,18))}</div>
        <div class="range-track">
          <div class="range-bar" style="left:${Math.max(0,left)}%;width:${Math.min(100,w)}%;background:linear-gradient(90deg,var(--accent)88,var(--accent))"></div>
          <div class="range-marker" style="left:${Math.max(0,Math.min(100,marker))}%"></div>
        </div>
        <div class="range-value mono">${fmt(t.value)} ${t.unit}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Raw tags
  if(rawTags.length>0){
    html+=`<div style="margin-bottom:16px"><div class="tag-section-title" style="color:var(--yellow)"><span>◈</span> Sinais Raw / Não Convertidos (${rawTags.length})</div>
    <table><thead><tr><th>Variável</th><th style="text-align:right">Valor</th><th style="text-align:right">Mín</th><th style="text-align:right">Máx</th><th style="text-align:right">Std</th><th style="text-align:right">Amostras</th></tr></thead><tbody>`;
    rawTags.forEach(t=>{
      html+=`<tr><td style="color:var(--yellow)">${esc(t.var)}</td>
        <td class="mono" style="text-align:right;font-weight:600;color:rgba(245,158,11,0.8)">${fmt(t.value,0)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.min,0)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.max,0)}</td>
        <td class="mono" style="text-align:right;color:var(--dim)">${fmt(t.std,1)}</td>
        <td class="mono" style="text-align:right;color:var(--muted);font-size:10px">${t.n}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // Status chips
  if(statusTags.length>0){
    html+=`<div style="margin-bottom:16px"><div class="tag-section-title" style="color:var(--cyan)"><span>◻</span> Status e Interlocks (${statusTags.length})</div><div class="status-chips">`;
    statusTags.forEach(t=>{
      const isOn=t.value>=0.5;
      const isMotor=t.type==='status';
      const dotColor=isMotor?(t.value===3?'var(--green)':t.value===0?'var(--red)':'var(--yellow)'):(isOn?'var(--green)':'rgba(239,68,68,0.4)');
      html+=`<div class="status-chip"><div class="status-dot" style="background:${dotColor};${isOn?'box-shadow:0 0 8px '+dotColor:''}"></div><div><div class="status-chip-label">${esc(t.var)}</div><div class="status-chip-value mono" style="color:${isMotor?'var(--text)':(isOn?'var(--green)':'var(--red)')}">${isMotor?motorLabel(t.value):(isOn?'ON':'OFF')}</div></div></div>`;
    });
    html+=`</div></div>`;
  }

  // Reliability analysis
  if(a&&a.desvio!==null){
    const col=sColor(a.desvio);
    const cvVal=a.primaryTag&&a.primaryTag.value>0?((a.primaryTag.std/a.primaryTag.value)*100):null;
    html+=`<div class="analysis-box"><div style="font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Análise de Confiabilidade / Energia</div>
    <div class="analysis-grid">
      <div class="analysis-item"><div class="analysis-label">Índice Degradação</div><div class="analysis-value mono" style="color:${a.ide>1.1?'var(--red)':a.ide>1.05?'var(--yellow)':'var(--green)'}">${a.ide?a.ide.toFixed(3):'—'}</div><div class="analysis-sub">IDE = Atual/Nominal</div></div>
      <div class="analysis-item"><div class="analysis-label">Desvio Percentual</div><div class="analysis-value mono" style="color:${col}">${a.desvio>0?'+':''}${a.desvio.toFixed(1)}%</div><div class="analysis-sub">(Atual - Nominal) / Nominal</div></div>
      <div class="analysis-item"><div class="analysis-label">Variabilidade (CV)</div><div class="analysis-value mono" style="color:${cvVal&&cvVal>30?'var(--orange)':'var(--green)'}">${cvVal?cvVal.toFixed(1):'—'}%</div><div class="analysis-sub">Coef. Variação (Std/Mean)</div></div>
    </div>
    <div class="diagnosis" style="border-left-color:${col};background:${col}11">
      ${Math.abs(a.desvio)>15?'Desvio crítico detectado. Recomenda-se inspeção imediata — verificar condição mecânica, obstrução, desbalanceamento ou degradação do acionamento.':
        Math.abs(a.desvio)>5?'Desvio moderado. Equipamento operando fora da faixa ideal — monitorar tendência. Possíveis causas: sujeira, desgaste, variação de carga.':
        'Equipamento operando dentro da faixa nominal. Sem ações corretivas necessárias no momento.'}
      ${cvVal&&cvVal>30?' Alta variabilidade indica possível instabilidade de processo ou ciclagem.':''}
    </div></div>`;
  }

  // Source info
  html+=`<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dim);padding:8px 0 0;border-top:1px solid var(--border)">
    <span>Fonte: Azure Data Explorer (Kusto) — ${esc(e.plc)}</span>
    <span>Tags: ${e.tags.length} | Amostras: ${a&&a.primaryTag?a.primaryTag.n:'—'}</span>
  </div>`;

  html+=`</div>`;

  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').style.display='flex';
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').style.display='none';
  document.body.style.overflow='';
}

// ═══════════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════
function attachHandlers(){
  // Equipment cards click
  document.querySelectorAll('[data-equip]').forEach(el=>{
    el.addEventListener('click',()=>openModal(el.dataset.equip));
  });

  // CSV import
  const dropZone=document.getElementById('dropZone');
  const csvInput=document.getElementById('csvInput');
  if(dropZone){
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');handleFiles(e.dataTransfer.files);});
  }
  if(csvInput){
    csvInput.addEventListener('change',e=>handleFiles(e.target.files));
  }
}

function handleFiles(files){
  const resultEl=document.getElementById('importResult');
  if(!resultEl) return;
  let totalHTML='';

  Array.from(files).forEach(file=>{
    if(!file.name.endsWith('.csv')){
      totalHTML+=`<div class="import-status" style="background:var(--red)22;color:var(--red)">Arquivo "${file.name}" não é CSV</div>`;
      return;
    }
    const reader=new FileReader();
    reader.onload=function(e){
      const parsed=parseKustoCSV(e.target.result);
      if(parsed.error){
        totalHTML+=`<div class="import-status" style="background:var(--red)22;color:var(--red)">Erro: ${parsed.error}</div>`;
      } else {
        const merge=mergeImportedData(parsed);
        const dateStr=parsed.date||'N/A';
        document.getElementById('headerDate').textContent=dateStr;
        totalHTML+=`<div style="background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border);margin-top:12px">
          <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px">✓ ${file.name} importado com sucesso</div>
          <div style="font-size:11px;color:var(--muted);line-height:1.8">
            Linhas processadas: <strong style="color:var(--text)">${parsed.rowCount}</strong><br>
            Tags encontradas: <strong style="color:var(--text)">${parsed.tagCount}</strong><br>
            Equipamentos atualizados: <strong style="color:var(--accent)">${merge.updatedCount}</strong><br>
            Equipamentos novos: <strong style="color:var(--cyan)">${merge.newCount}</strong><br>
            Data coleta: <strong style="color:var(--text)">${dateStr}</strong>
          </div>
        </div>`;
        resultEl.innerHTML=totalHTML;
      }
    };
    reader.readAsText(file);
  });
}
