<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Optimization — Planta Indaiatuba</title>
<style>
:root {
  /* Light Mode - High-Tech Minimalist */
  --bg:#f6f8fb; --bg2:#ffffff; --card:#ffffff; --card2:#f1f5f9;
  --border:#e5e7eb; --border2:#d1d5db;
  --accent:#3b82f6; --accent-light:rgba(59,130,246,0.08);
  --green:#10b981; --yellow:#f59e0b; --orange:#f97316; --red:#ef4444;
  --purple:#8b5cf6; --cyan:#06b6d4; --pink:#ec4899;
  --text:#0f172a; --muted:#475569; --dim:#94a3b8;
  --shadow-sm:0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
  --shadow-md:0 4px 16px rgba(15,23,42,0.06), 0 2px 6px rgba(15,23,42,0.04);
  --shadow-lg:0 10px 30px rgba(15,23,42,0.08), 0 4px 12px rgba(15,23,42,0.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif; font-size:13px; -webkit-font-smoothing:antialiased; display:flex; min-height:100vh; }
.mono { font-family:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace; }

/* SIDEBAR */
.sidebar { width:220px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); padding:20px 14px; display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh; overflow-y:auto; }
.sidebar-brand { display:flex; align-items:center; gap:10px; padding:2px 8px 18px; margin-bottom:8px; border-bottom:1px solid var(--border); }
.sidebar-logo { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#3b82f6,#06b6d4); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(59,130,246,0.25); flex-shrink:0; }
.sidebar-logo svg { width:18px; height:18px; color:#fff; }
.sidebar-title { font-size:13px; font-weight:700; color:var(--text); letter-spacing:0.2px; line-height:1.15; }
.sidebar-subtitle { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:0.8px; margin-top:2px; }
.sidebar-section { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; font-weight:600; padding:14px 10px 6px; }
.tab-btn { display:flex; align-items:center; gap:11px; padding:10px 12px; font-size:12px; font-weight:500; color:var(--muted); background:none; border:none; cursor:pointer; border-radius:10px; transition:all .15s; font-family:inherit; text-align:left; width:100%; }
.tab-btn svg { width:16px; height:16px; flex-shrink:0; stroke-width:1.8; color:var(--dim); }
.tab-btn:hover { background:var(--card2); color:var(--text); }
.tab-btn:hover svg { color:var(--muted); }
.tab-btn.active { background:var(--accent-light); color:var(--accent); font-weight:600; }
.tab-btn.active svg { color:var(--accent); }
.sidebar-footer { margin-top:auto; padding:12px 10px 4px; border-top:1px solid var(--border); font-size:10px; color:var(--dim); display:flex; align-items:center; }
.sidebar-footer .live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; margin-right:8px; box-shadow:0 0 0 3px rgba(16,185,129,0.18); animation:pulse 2s infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

/* MAIN AREA */
.main { flex:1; min-width:0; display:flex; flex-direction:column; }

/* HEADER */
.header { border-bottom:1px solid var(--border); padding:18px 0; background:var(--bg2); width:100%; box-sizing:border-box; }
.header-inner { display:flex; justify-content:space-between; align-items:center; width:100%; max-width:1400px; margin:0 auto; padding:0 32px; box-sizing:border-box; }
.header-left { display:flex; flex-direction:column; }
.header-title { font-size:19px; font-weight:700; letter-spacing:-0.3px; color:var(--text); }
.header-subtitle { font-size:11px; color:var(--dim); margin-top:3px; letter-spacing:0.3px; font-weight:500; }
.header-badge { display:none; }
.header-right { display:flex; gap:10px; align-items:center; font-size:11px; color:var(--muted); }
.header-right .chip, .header-date { background:var(--card2); padding:7px 13px; border-radius:8px; color:var(--muted); font-weight:500; border:1px solid var(--border); }

/* CONTENT */
.content { padding:24px 32px 48px; max-width:1400px; width:100%; box-sizing:border-box; margin:0 auto; }

/* KPI GRID */
.kpi-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; margin-bottom:22px; }
.kpi { background:var(--card); border-radius:16px; padding:18px 20px; position:relative; overflow:hidden; border:1px solid var(--border); box-shadow:var(--shadow-sm); transition:transform .2s, box-shadow .2s; }
.kpi:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
.kpi-bar { display:none; }
.kpi-icon { position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.kpi-label { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
.kpi-value { font-size:26px; font-weight:700; margin-top:6px; color:var(--text); letter-spacing:-0.5px; }
.kpi-sub { font-size:10px; color:var(--muted); margin-top:4px; font-weight:500; }

/* CARDS */
.card { background:var(--card); border-radius:16px; padding:22px 24px; border:1px solid var(--border); margin-bottom:18px; box-shadow:var(--shadow-sm); }
.card-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:16px; }
.card-title .sub { font-size:10px; color:var(--dim); font-weight:500; margin-left:10px; letter-spacing:0.3px; text-transform:none; }

/* EQUIPMENT GRID */
.equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.section-title { font-size:12px; font-weight:700; color:var(--text); text-transform:uppercase; letter-spacing:0.8px; margin:20px 0 12px 2px; }

/* EQUIPMENT CARD */
.equip-card { background:var(--card); border-radius:16px; padding:16px 18px; border:1px solid var(--border); cursor:pointer; position:relative; overflow:hidden; transition:all .2s; border-left:4px solid var(--dim); box-shadow:var(--shadow-sm); }
.equip-card:hover { border-color:var(--accent); box-shadow:var(--shadow-md); transform:translateY(-1px); }
.equip-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.equip-id { font-size:11px; font-weight:700; color:var(--accent); }
.equip-status { font-size:9px; font-weight:700; padding:2px 8px; border-radius:6px; text-transform:uppercase; letter-spacing:0.5px; }
.equip-name { font-size:12px; font-weight:600; color:var(--text); margin:4px 0 2px; }
.equip-area { font-size:10px; color:var(--dim); }
.equip-value { font-size:20px; font-weight:700; line-height:1; text-align:right; color:var(--text); }
.equip-unit { font-size:10px; color:var(--dim); margin-left:2px; font-weight:500; }
.equip-desvio { font-size:11px; font-weight:700; margin-top:4px; text-align:right; }
.equip-footer { display:flex; justify-content:space-between; margin-top:12px; padding-top:10px; border-top:1px solid var(--border); font-size:10px; }
.equip-footer-left { color:var(--dim); }
.equip-footer-right { color:var(--accent); font-weight:600; }

/* TABLE */
table { width:100%; border-collapse:collapse; }
th { padding:10px 10px; color:var(--dim); font-weight:700; font-size:9px; text-transform:uppercase; letter-spacing:0.8px; border-bottom:1px solid var(--border); text-align:left; background:var(--card2); }
td { padding:10px 10px; font-size:12px; border-bottom:1px solid var(--border); color:var(--text); }
tr:hover td { background:var(--accent-light); }
tr.clickable { cursor:pointer; }

/* MODAL */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(15,23,42,0.35); backdrop-filter:blur(6px); z-index:1000; display:flex; justify-content:center; align-items:flex-start; padding:30px 20px; overflow:auto; }
.modal { background:var(--card); border-radius:18px; border:1px solid var(--border); max-width:900px; width:100%; color:var(--text); position:relative; box-shadow:var(--shadow-lg); }
.modal-header { padding:22px 26px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; }
.modal-close { background:none; border:none; color:var(--dim); font-size:22px; cursor:pointer; padding:4px 8px; line-height:1; border-radius:6px; }
.modal-close:hover { color:var(--text); background:var(--card2); }
.modal-kpis { display:flex; gap:1px; background:var(--border); }
.modal-kpi { flex:1; background:var(--card2); padding:14px 18px; text-align:center; }
.modal-kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.modal-kpi-value { font-size:22px; font-weight:700; margin-top:4px; color:var(--text); }
.modal-body { padding:18px 26px 22px; }

/* TAG SECTION */
.tag-section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; display:flex; align-items:center; gap:6px; color:var(--muted); }

/* STATUS CHIPS */
.status-chips { display:flex; flex-wrap:wrap; gap:8px; }
.status-chip { background:var(--card2); border-radius:10px; padding:8px 14px; border:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.status-dot { width:8px; height:8px; border-radius:50%; }
.status-chip-label { font-size:10px; color:var(--muted); }
.status-chip-value { font-size:11px; font-weight:600; color:var(--text); }

/* ANALYSIS BOX */
.analysis-box { background:var(--card2); border-radius:14px; padding:16px; border:1px solid var(--border); margin-bottom:16px; }
.analysis-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.analysis-item { background:var(--card); border-radius:12px; padding:14px; text-align:center; border:1px solid var(--border); }
.analysis-label { font-size:9px; color:var(--dim); text-transform:uppercase; font-weight:600; letter-spacing:0.5px; }
.analysis-value { font-size:18px; font-weight:700; margin-top:4px; color:var(--text); }
.analysis-sub { font-size:9px; color:var(--dim); }
.diagnosis { margin-top:12px; padding:12px 16px; border-radius:10px; border-left:3px solid; font-size:12px; line-height:1.55; }

/* ALERT CARD */
.alert-card { background:var(--card); border-radius:14px; padding:18px; border:1px solid var(--border); border-left:4px solid; cursor:pointer; margin-bottom:12px; transition:all .2s; box-shadow:var(--shadow-sm); }
.alert-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }

/* REC CARD */
.rec-card { background:var(--card); border-radius:12px; padding:14px 16px; border-left:3px solid; display:flex; gap:12px; align-items:center; border:1px solid var(--border); margin-bottom:10px; box-shadow:var(--shadow-sm); }
.rec-pri { font-size:10px; font-weight:700; min-width:44px; }
.rec-text { font-size:12px; color:var(--text); line-height:1.45; }

/* CHART BAR */
.bar-chart { display:flex; flex-direction:column; gap:8px; }
.bar-row { display:flex; align-items:center; gap:12px; }
.bar-label { font-size:11px; color:var(--muted); width:110px; text-align:right; flex-shrink:0; font-weight:600; }
.bar-track { flex:1; height:22px; background:var(--card2); border-radius:11px; position:relative; overflow:hidden; border:1px solid var(--border); }
.bar-fill { height:100%; border-radius:11px; transition:width .5s; position:absolute; }
.bar-nom { height:100%; width:2px; background:var(--accent); position:absolute; top:0; opacity:0.6; }
.bar-val-label { font-size:11px; width:70px; text-align:right; flex-shrink:0; font-weight:600; color:var(--text); }

/* CSV IMPORT */
.import-zone { border:2px dashed var(--border2); border-radius:14px; padding:24px; text-align:center; cursor:pointer; transition:all .2s; margin-bottom:14px; background:var(--card2); }
.import-zone:hover { border-color:var(--accent); background:var(--accent-light); }
.import-zone.dragover { border-color:var(--green); background:rgba(16,185,129,0.08); }
.import-btn { background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; margin-top:8px; box-shadow:0 2px 6px rgba(59,130,246,0.3); }
.import-btn:hover { background:#2563eb; }
.import-info { font-size:11px; color:var(--dim); margin-top:6px; }
.import-status { font-size:11px; margin-top:8px; padding:6px 12px; border-radius:6px; display:inline-block; }

/* RANGE VIS */
.range-vis { display:flex; flex-direction:column; gap:8px; padding-top:8px; }
.range-row { display:flex; align-items:center; gap:10px; }
.range-label { font-size:11px; color:var(--muted); width:90px; text-align:right; }
.range-track { flex:1; height:20px; background:var(--card2); border-radius:10px; position:relative; border:1px solid var(--border); }
.range-bar { position:absolute; height:100%; border-radius:10px; }
.range-marker { position:absolute; top:-2px; width:2px; height:24px; background:var(--text); border-radius:1px; }
.range-value { font-size:11px; width:50px; text-align:right; font-weight:600; }

/* GAUGE & TANK */
.gauge { text-align:center; flex:1; }
.gauge-tank { width:72px; background:var(--card2); border-radius:12px; height:160px; position:relative; overflow:hidden; margin:0 auto; border:1px solid var(--border); }
.gauge-fill { position:absolute; bottom:0; width:100%; border-radius:0 0 12px 12px; transition:height .5s; }
.gauge-label { font-size:11px; color:var(--muted); margin-bottom:8px; font-weight:600; }
.gauge-value { font-size:22px; font-weight:700; margin-top:10px; color:var(--text); }
.gauge-sub { font-size:10px; color:var(--dim); }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; }
.temp-display { text-align:center; padding:22px; }
.temp-value { font-size:52px; font-weight:700; letter-spacing:-1.5px; color:var(--text); }
.temp-sub { font-size:12px; color:var(--muted); margin-top:6px; }

/* PARETO CHART */
.pareto-container { position:relative; margin-top:8px; }
.pareto-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; cursor:pointer; padding:6px 8px; border-radius:10px; transition:background .2s; }
.pareto-row:hover { background:var(--card2); }
.pareto-row.active { background:var(--accent-light); }
.pareto-label { font-size:11px; color:var(--muted); width:140px; text-align:right; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
.pareto-bar-wrap { flex:1; display:flex; align-items:center; gap:10px; }
.pareto-bar-track { flex:1; height:22px; background:var(--card2); border-radius:11px; position:relative; overflow:hidden; border:1px solid var(--border); }
.pareto-bar-fill { height:100%; border-radius:11px; transition:width .5s; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; }
.pareto-bar-count { font-size:10px; font-weight:700; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.35); }
.pareto-pct { font-size:11px; color:var(--muted); width:44px; text-align:right; flex-shrink:0; font-weight:600; }
.pareto-legend { display:flex; gap:18px; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap; }
.pareto-legend-item { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--muted); font-weight:500; }
.pareto-legend-dot { width:10px; height:10px; border-radius:3px; }
.pareto-detail { display:none; margin:0 0 14px 0; padding:18px; background:var(--card2); border:1px solid var(--border); border-radius:14px; animation:slideDown .3s ease; }
.pareto-detail.open { display:block; }
@keyframes slideDown { from{opacity:0;max-height:0;transform:translateY(-8px)} to{opacity:1;max-height:2000px;transform:translateY(0)} }
.pareto-detail-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.pareto-detail-title { font-size:13px; font-weight:700; color:var(--text); }
.pareto-detail-summary { display:flex; gap:14px; font-size:10px; color:var(--muted); }
.pareto-detail-summary span { display:flex; align-items:center; gap:4px; font-weight:500; }
.pareto-equip-table { width:100%; border-collapse:collapse; font-size:11px; background:var(--card); border-radius:10px; overflow:hidden; }
.pareto-equip-table th { font-size:9px; text-transform:uppercase; letter-spacing:.5px; color:var(--dim); padding:8px 10px; border-bottom:1px solid var(--border); font-weight:700; background:var(--card2); }
.pareto-equip-table td { padding:10px; border-bottom:1px solid var(--border); }
.pareto-equip-table tr { cursor:pointer; transition:background .15s; }
.pareto-equip-table tr:hover td { background:var(--accent-light); }
.pareto-equip-table .equip-link { color:var(--accent); font-weight:700; text-decoration:none; }
.pareto-insight { margin-top:12px; padding:12px 16px; border-radius:12px; font-size:12px; line-height:1.6; border-left:3px solid; }
.pareto-insight.critical { border-color:var(--red); background:rgba(239,68,68,0.06); color:var(--muted); }
.pareto-insight.warning { border-color:var(--orange); background:rgba(249,115,22,0.06); color:var(--muted); }
.pareto-insight.ok { border-color:var(--green); background:rgba(16,185,129,0.06); color:var(--muted); }
.pareto-mini-bar { height:5px; border-radius:3px; background:var(--card2); overflow:hidden; min-width:60px; }
.pareto-mini-fill { height:100%; border-radius:3px; }

/* FINANCIAL TOP 5 - gradient premium bars */
.fin-list { display:flex; flex-direction:column; gap:14px; margin-top:4px; }
.fin-row { display:grid; grid-template-columns:72px 220px 1fr 180px; gap:14px; align-items:center; cursor:pointer; padding:6px 4px; border-radius:10px; transition:background .15s; }
.fin-row:hover { background:var(--card2); }
.fin-tag { font-size:13px; font-weight:700; color:var(--accent); letter-spacing:0.5px; }
.fin-name { font-size:13px; font-weight:600; color:var(--text); }
.fin-name-sub { font-size:10px; color:var(--dim); margin-top:2px; font-weight:500; }
.fin-bar-wrap { position:relative; height:26px; display:flex; align-items:center; }
.fin-bar-track { flex:1; height:20px; background:var(--card2); border-radius:12px; position:relative; overflow:hidden; border:1px solid var(--border); }
.fin-bar-fill { position:absolute; left:0; top:0; bottom:0; border-radius:12px; background:linear-gradient(90deg,#3b82f6 0%,#06b6d4 25%,#f59e0b 60%,#f97316 80%,#ef4444 100%); box-shadow:0 2px 8px rgba(239,68,68,0.22); transition:width .8s; }
.fin-coin { position:absolute; top:50%; transform:translate(50%,-50%); width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,#fbbf24,#f59e0b); border:2px solid #fff; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:700; box-shadow:0 3px 8px rgba(245,158,11,0.35); }
.fin-value { text-align:right; }
.fin-value-main { font-size:16px; font-weight:700; color:var(--red); letter-spacing:-0.2px; }
.fin-value-sub { font-size:10px; color:var(--dim); margin-top:2px; font-weight:500; }

/* RADAR CHART */
.radar-wrap { display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
.radar-svg { flex-shrink:0; }
.radar-legend { display:flex; flex-direction:column; gap:10px; min-width:180px; }
.radar-legend-item { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--text); font-weight:500; }
.radar-legend-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
.radar-legend-sub { font-size:10px; color:var(--dim); font-weight:400; }

/* HEATMAP */
.sparkline { display:inline-block; }
.radar-chip { background:var(--card2); color:var(--muted); border:1px solid var(--border); padding:6px 11px; border-radius:8px; font-size:11px; font-weight:500; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:4px; font-family:inherit; }
.radar-chip:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
.radar-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
.radar-chip.active:hover { background:var(--accent); }
.radar-chip.equip { padding:5px 9px; font-size:10px; }
.trend-cell { display:flex; align-items:center; gap:6px; justify-content:flex-end; }
.heatmap-wrap { overflow-x:auto; padding-top:4px; }
.heatmap-table { border-collapse:separate; border-spacing:3px; }
.heatmap-table th { background:none; border:none; padding:0 3px 6px; font-size:9px; color:var(--dim); font-weight:500; text-transform:none; letter-spacing:0; text-align:center; }
.heatmap-table th.asset-th { text-align:right; padding-right:10px; width:90px; font-size:11px; color:var(--muted); font-weight:600; }
.heatmap-table td { padding:0; border:none; }
.heatmap-table td.asset-label { text-align:right; padding-right:10px; font-size:11px; color:var(--text); font-weight:600; font-family:'SF Mono',monospace; background:none; }
.heatmap-cell { width:22px; height:22px; border-radius:5px; display:inline-block; cursor:pointer; transition:transform .15s; border:1px solid rgba(15,23,42,0.04); }

  tensao: 440,          // V (tensão nominal dos motores)
  fatorPotencia: 0.85,  // FP típico
  tarifa: 0.65,         // R$/kWh
  custoVapor: 120,      // R$/ton
  horasDia: 24          // h/dia (para anualizar)
};

// Histórico temporal de tags — populado pela importação de série temporal
// Estrutura: tagHistory[equipId][varName] = [{date:"2025-04-01", value:180.5}, ...]
let tagHistory = {};
let tsImportHistory = [];

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
function desvio(atual,nom){ return nom ? ((atual-nom)/nom*100) : null; }
function sColor(d){ return d===null?'var(--dim)':Math.abs(d)>15?'var(--red)':Math.abs(d)>10?'var(--orange)':Math.abs(d)>5?'var(--yellow)':'var(--green)'; }
function sLabel(d){ return d===null?'N/A':Math.abs(d)>15?'CRITICO':Math.abs(d)>10?'ALERTA':Math.abs(d)>5?'ATENÇÃO':'NORMAL'; }
function fmt(n,dec=1){ return n===null||n===undefined?'—':typeof n==='number'?(Number.isInteger(n)?n.toString():n.toFixed(dec)):n; }
function motorLabel(v){ return v===3?'Operando':v===0?'Parado':v===5?'Falha':`Status ${v}`; }
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function getEquipAnalysis(id){
  const e=EQUIPMENT[id]; if(!e) return null;
  const pt=e.tags.find(t=>t.type==='analog');
  const nk=Object.keys(e.nominal)[0];
  const nv=e.nominal[nk];
  const d=pt&&nv?desvio(pt.value,nv):null;
  const ide=pt&&nv?pt.value/nv:null;
  const cv=pt&&pt.value>0?(pt.std/pt.value*100):null;
  return {primaryTag:pt,nomKey:nk,nomVal:nv,desvio:d,ide,cv};
}

// ═══════════════════════════════════════════════════════════════════
// CUSTO — Conversão de desvio em R$/h
// ═══════════════════════════════════════════════════════════════════
// Calcula perda financeira estimada por hora de um equipamento.
// Motores: usa corrente nominal vs atual → ΔkW = √3·V·ΔI·FP/1000 → R$/h = ΔkW·tarifa
// Vazão de vapor: usa (vazao_nom - vazao_atual) · custoVapor (assume unidade ton/h)
// Retorna {kwPerdido, rsHora, rsDia, rsMes, tipo, obs}
function calcCustoDesvio(equipId){
  const e=EQUIPMENT[equipId]; if(!e) return null;
  const nom=e.nominal||{};

  // Caso 1: motor com corrente nominal (ventiladores, bombas, correias)
  if(typeof nom.corrente==='number'){
    const tagI=e.tags.find(t=>/corrente atual/i.test(t.var)) || e.tags.find(t=>/corrente/i.test(t.var)&&t.type==='analog');
    if(!tagI||typeof tagI.value!=='number') return null;
    const delta=Math.abs(nom.corrente-tagI.value);
    if(delta<0.1) return {kwPerdido:0,rsHora:0,rsDia:0,rsMes:0,tipo:'motor',obs:'Dentro do nominal'};
    // Potência trifásica equivalente ao desvio de corrente
    const kW=(Math.sqrt(3)*COST_PARAMS.tensao*delta*COST_PARAMS.fatorPotencia)/1000;
    const rsH=kW*COST_PARAMS.tarifa;
    const direcao=tagI.value<nom.corrente?'perda de carga/produção':'sobre-consumo';
    return {
      kwPerdido:kW, rsHora:rsH, rsDia:rsH*COST_PARAMS.horasDia, rsMes:rsH*COST_PARAMS.horasDia*30,
      tipo:'motor', direcao, delta, obs:`ΔI=${delta.toFixed(1)}A (${direcao})`
    };
  }

  // Caso 2: vazão de vapor (assume nominal em ton/h ou %)
  if(typeof nom.vazao==='number'){
    const tagV=e.tags.find(t=>/vaz[aã]o/i.test(t.var)&&t.type==='analog');
    if(!tagV||typeof tagV.value!=='number') return null;
    const delta=Math.abs(nom.vazao-tagV.value);
    if(delta<0.1) return {kwPerdido:0,rsHora:0,rsDia:0,rsMes:0,tipo:'vapor',obs:'Dentro do nominal'};
    // Se vazão está em % nominal, delta é %; assume 1% ≈ 1 ton/h como escala relativa.
    // Para valores absolutos, o custo é delta * custoVapor direto.
    const rsH=delta*COST_PARAMS.custoVapor;
    return {
      kwPerdido:0, rsHora:rsH, rsDia:rsH*COST_PARAMS.horasDia, rsMes:rsH*COST_PARAMS.horasDia*30,
      tipo:'vapor', delta, obs:`ΔVazão=${delta.toFixed(1)} ton/h`
    };
  }

  return null;
}

function calcCustoTotal(){
  let totalRsH=0, totalKw=0, contados=0;
  Object.keys(EQUIPMENT).forEach(id=>{
    const c=calcCustoDesvio(id);
    if(c&&c.rsHora>0){ totalRsH+=c.rsHora; totalKw+=c.kwPerdido; contados++; }
  });
  return {rsHora:totalRsH, rsDia:totalRsH*COST_PARAMS.horasDia, rsMes:totalRsH*COST_PARAMS.horasDia*30, kw:totalKw, equipamentos:contados};
}

function fmtRs(v){
  if(v===null||v===undefined||isNaN(v)) return '—';
  if(v>=1000) return 'R$ '+(v/1000).toFixed(1)+'k';
  return 'R$ '+v.toFixed(2);
}

function updateCostParam(key,value){
  const v=parseFloat(value);
  if(isNaN(v)||v<0) return;
  COST_PARAMS[key]=v;
  render();
}

// ═══════════════════════════════════════════════════════════════════
// HISTÓRICO TEMPORAL — Importação de série temporal
// ═══════════════════════════════════════════════════════════════════
// Formato esperado (long): Timestamp,EquipId,VarName,Value
// ou (wide): Timestamp,<EquipId>.<VarName>,<EquipId>.<VarName>,...
function parseTimeSeriesCSV(csvText){
  const lines=csvText.split('\n').filter(l=>l.trim());
  if(lines.length<2) return {error:'CSV vazio ou inválido'};
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const tsCol=headers.findIndex(h=>/timestamp|data|date|time/i.test(h));
  if(tsCol<0) return {error:'Coluna de timestamp não encontrada'};

  // Detecta formato: long (EquipId + VarName + Value) ou wide
  const equipCol=headers.findIndex(h=>/equipid|machine|equipamento/i.test(h));
  const varCol=headers.findIndex(h=>/var|tag|name/i.test(h));
  const valCol=headers.findIndex(h=>/value|valor/i.test(h));

  const added={};
  let points=0;

  if(equipCol>=0 && varCol>=0 && valCol>=0){
    // Long format
    for(let i=1;i<lines.length;i++){
      const v=lines[i].split(',').map(x=>x.trim().replace(/^"|"$/g,''));
      if(v.length<headers.length) continue;
      const ts=v[tsCol], eid=v[equipCol], vn=v[varCol], val=parseFloat(v[valCol]);
      if(!ts||!eid||!vn||isNaN(val)) continue;
      if(!tagHistory[eid]) tagHistory[eid]={};
      if(!tagHistory[eid][vn]) tagHistory[eid][vn]=[];
      tagHistory[eid][vn].push({date:ts.substring(0,10),value:val});
      added[eid]=(added[eid]||0)+1;
      points++;
    }
  } else {
    // Wide format: colunas são "EquipId.VarName" ou "EquipId - VarName"
    const tagCols=headers.map((h,i)=>({h,i})).filter(x=>x.i!==tsCol);
    for(let i=1;i<lines.length;i++){
      const v=lines[i].split(',').map(x=>x.trim().replace(/^"|"$/g,''));
      if(v.length<headers.length) continue;
      const ts=v[tsCol];
      if(!ts) continue;
      tagCols.forEach(({h,i:ci})=>{
        const val=parseFloat(v[ci]); if(isNaN(val)) return;
        // Parse "EquipId - VarName" ou "EquipId.VarName"
        let eid,vn;
        if(h.includes(' - ')){ [eid,...var_]=h.split(' - '); vn=var_.join(' - '); }
        else if(h.includes('.')){ const p=h.split('.'); eid=p[0]; vn=p.slice(1).join('.'); }
        else { eid=h; vn='Valor'; }
        eid=eid.trim(); vn=vn.trim();
        if(!tagHistory[eid]) tagHistory[eid]={};
        if(!tagHistory[eid][vn]) tagHistory[eid][vn]=[];
        tagHistory[eid][vn].push({date:ts.substring(0,10),value:val});
        added[eid]=(added[eid]||0)+1;
        points++;
      });
    }
  }

  // Ordena cada série por data
  Object.keys(tagHistory).forEach(eid=>{
    Object.keys(tagHistory[eid]).forEach(vn=>{
      tagHistory[eid][vn].sort((a,b)=>a.date.localeCompare(b.date));
    });
  });

  return {points, equipamentos:Object.keys(added).length, formato:equipCol>=0?'long':'wide'};
}

function getHistorySlice(equipId,varName,days){
  if(!tagHistory[equipId]||!tagHistory[equipId][varName]) return [];
  const all=tagHistory[equipId][varName];
  if(all.length===0) return [];
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
  const cutStr=cutoff.toISOString().substring(0,10);
  return all.filter(p=>p.date>=cutStr);
}

function renderSparkline(points,w,h,color){
  if(!points||points.length<2) return '';
  const vals=points.map(p=>p.value);
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const range=mx-mn||1;
  const step=w/(points.length-1);
  const path=points.map((p,i)=>{
    const x=(i*step).toFixed(1);
    const y=(h-((p.value-mn)/range)*h).toFixed(1);
    return (i===0?'M':'L')+x+','+y;
  }).join(' ');
  const last=points[points.length-1];
  const first=points[0];
  const trend=last.value>first.value?'▲':last.value<first.value?'▼':'■';
  const trendColor=last.value>first.value?'var(--red)':last.value<first.value?'var(--green)':'var(--muted)';
  return `<svg width="${w}" height="${h}" style="display:block"><path d="${path}" fill="none" stroke="${color||'var(--accent)'}" stroke-width="1.5"/></svg>
    <div style="font-size:9px;color:var(--dim);display:flex;justify-content:space-between;margin-top:2px">
      <span class="mono">${points.length} pts</span>
      <span style="color:${trendColor}">${trend} ${((last.value-first.value)/(first.value||1)*100).toFixed(1)}%</span>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// CSV PARSER — Kusto/ADX pivot format
// ═══════════════════════════════════════════════════════════════════
function parseKustoCSV(csvText){
  const lines=csvText.split('\n').filter(l=>l.trim());
  if(lines.length<2) return {error:'CSV vazio ou inválido'};
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));

  // Detect Kusto format
  const hasKustoCols = headers.includes('SiteId') || headers.includes('MachineId') || headers.includes('DATA_CORRIGIDA');
  const metaCols = ['SiteId','MachineId','DATA_CORRIGIDA','Timestamp'];
  const tagCols = headers.filter(h=>!metaCols.includes(h));

  // Parse rows
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=lines[i].split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    if(vals.length<headers.length) continue;
    const row={};
    headers.forEach((h,j)=>row[h]=vals[j]);
    rows.push(row);
  }

  // Compute stats per tag
  const results={};
  let dateStr='';
  if(rows.length>0&&rows[0].DATA_CORRIGIDA) dateStr=rows[0].DATA_CORRIGIDA;

  tagCols.forEach(col=>{
    const vals=rows.map(r=>parseFloat(r[col])).filter(v=>!isNaN(v));
    if(vals.length===0) return;
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const min=Math.min(...vals);
    const max=Math.max(...vals);
    const std=vals.length>1?Math.sqrt(vals.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/(vals.length-1)):0;

    // Extract equipment ID from tag name
    const parts=col.split('.');
    const tagShort=parts[parts.length-1]||col;
    const equipId=(tagShort.split(' - ')[0]||'').trim();
    const varName=(tagShort.split(' - ').slice(1).join(' - ')||tagShort).trim();

    // Classify type
    let type='analog';
    if(vals.length<=5 && (max===0||max===1)) type='bool';
    else if(vals.length<=5 && (max===3||max===4||max===5)) type='status';
    else if(max>1000 && !varName.toLowerCase().includes('convert')) type='raw';

    // Detect unit from var name
    let unit='';
    if(/corrente|current/i.test(varName)&&type==='analog') unit='A';
    if(/velocidade|speed|rpm/i.test(varName)) unit=varName.toLowerCase().includes('rpm')?'RPM':'%';
    if(/temperatura|temp/i.test(varName)) unit='°C';
    if(/pressao|press/i.test(varName)) unit='mmH₂O';
    if(/vazao|flow/i.test(varName)) unit='T/H';
    if(/vibra/i.test(varName)) unit='raw';

    if(!results[equipId]) results[equipId]={id:equipId,tags:[]};
    results[equipId].tags.push({var:varName,value:Math.round(mean*100)/100,min:Math.round(min*100)/100,max:Math.round(max*100)/100,std:Math.round(std*100)/100,unit,n:vals.length,type});
  });

  return {equipment:results,rowCount:rows.length,tagCount:tagCols.length,date:dateStr};
}

function mergeImportedData(parsed){
  let newCount=0, updatedCount=0;
  Object.entries(parsed.equipment).forEach(([eqId,eqData])=>{
    // Try to find matching equipment in EQUIPMENT
    let matchKey = Object.keys(EQUIPMENT).find(k=>k===eqId||EQUIPMENT[k].id===eqId);
    if(matchKey){
      // Update existing: replace tags with analog data > threshold
      const newAnalog = eqData.tags.filter(t=>t.type==='analog'&&t.n>2);
      if(newAnalog.length>0){
        const existing=EQUIPMENT[matchKey];
        newAnalog.forEach(nt=>{
          const idx=existing.tags.findIndex(t=>t.var.includes(nt.var.substring(0,15))||nt.var.includes(t.var.substring(0,15)));
          if(idx>=0){
            existing.tags[idx]={...existing.tags[idx],...nt};
          } else {
            existing.tags.push(nt);
          }
        });
        updatedCount++;
      }
    } else if(eqData.tags.filter(t=>t.type==='analog'&&t.n>2).length>0){
      // Add new equipment
      const analogTags=eqData.tags.filter(t=>t.n>2);
      EQUIPMENT[eqId]={
        id:eqId, name:eqId.replace(/_/g,' '), area:'Importado CSV', type:'Importado',
        plc:'CSV', status:'Importado', nominal:{},
        tags:analogTags,
      };
      newCount++;
    }
  });
  return {newCount,updatedCount};
}

function clearAllData(){
  const totalEquip=Object.keys(EQUIPMENT).length;
  const initialCount=Object.keys(EQUIPMENT_INITIAL).length;
  const importedCount=totalEquip-initialCount;
  if(importHistory.length===0&&importedCount===0){
    if(!confirm('Nenhum dado importado foi detectado. Ainda assim deseja restaurar todos os equipamentos ao estado original?')) return;
  } else {
    const msg=`Tem certeza que deseja LIMPAR TODOS OS DADOS?\n\n• ${importedCount} equipamento(s) importado(s) serão removidos\n• ${importHistory.length} CSV(s) processado(s) serão descartados\n• Todos os equipamentos originais voltarão aos valores de fábrica\n\nEsta ação não pode ser desfeita.`;
    if(!confirm(msg)) return;
  }
  // Remove todas as chaves atuais de EQUIPMENT
  Object.keys(EQUIPMENT).forEach(k=>{ delete EQUIPMENT[k]; });
  // Restaura estado inicial (deep clone)
  const snapshot=JSON.parse(JSON.stringify(EQUIPMENT_INITIAL));
  Object.keys(snapshot).forEach(k=>{ EQUIPMENT[k]=snapshot[k]; });
  importHistory=[];
  Object.keys(tagHistory).forEach(k=>delete tagHistory[k]);
  tsImportHistory=[];
  const resultEl=document.getElementById('importResult');
  if(resultEl) resultEl.innerHTML='';
  const resultTSEl=document.getElementById('importResultTS');
  if(resultTSEl) resultTSEl.innerHTML='';
  render();
  // Feedback visual após re-render
  setTimeout(()=>{
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;top:20px;right:20px;background:rgba(16,185,129,0.95);color:#fff;padding:14px 22px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:center;gap:10px';
    banner.innerHTML='<span style="font-size:18px">✓</span> Dados limpos com sucesso. Dashboard restaurado.';
    document.body.appendChild(banner);
    setTimeout(()=>{banner.style.transition='opacity 0.4s';banner.style.opacity='0';setTimeout(()=>banner.remove(),400);},2800);
  },50);
}

let currentTab='overview';

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  render();
}

function render(){
  const el=document.getElementById('content');
  switch(currentTab){
    case 'overview': el.innerHTML=renderOverview(); renderTop5Drilldown(); renderParetoDrilldown(); break;
    case 'caldeira': el.innerHTML=renderCaldeira(); break;
    case 'ventiladores': el.innerHTML=renderVentiladores(); break;
    case 'bombas': el.innerHTML=renderBombas(); break;
    case 'motores': el.innerHTML=renderMotores(); break;
    case 'analysis': el.innerHTML=renderAnalysis(); renderRadarDrilldown(); renderHeatmapDrilldown(); break;
    case 'alerts': el.innerHTML=renderAlerts(); break;
    case 'simulator': el.innerHTML=renderSimulator(); renderSimulatorView(); break;
    case 'import': el.innerHTML=renderImport(); break;
    case 'params': el.innerHTML=renderParams(); break;
  }
  attachHandlers();
}

function renderOverview(){
  const ids=Object.keys(EQUIPMENT);
  const vents=ids.filter(k=>EQUIPMENT[k].type==='Ventilador');
  const bombas=ids.filter(k=>EQUIPMENT[k].type==='Bomba');
  const temps=ids.filter(k=>EQUIPMENT[k].type==='Temperatura');
  const press=ids.filter(k=>EQUIPMENT[k].type==='Pressão');
  const outros=ids.filter(k=>!['Ventilador','Bomba','Temperatura','Pressão'].includes(EQUIPMENT[k].type));

  const analyses=ids.map(k=>{const a=getEquipAnalysis(k);return a?{id:k,...a}:null;}).filter(Boolean);
  const critCount=analyses.filter(x=>x.desvio!==null&&Math.abs(x.desvio)>10).length;
  const okCount=analyses.filter(x=>x.desvio!==null&&Math.abs(x.desvio)<=5).length;
  const fornalha=EQUIPMENT.TT13640?EQUIPMENT.TT13640.tags[0]:null;

  const custo=calcCustoTotal();

  let html=`<div class="kpi-grid">`;
  [{icon:'⚡',label:'Equipamentos',value:ids.length,color:'var(--accent)',bg:'rgba(59,130,246,0.1)',sub:`${vents.length} vent. · ${bombas.length} bombas`},
   {icon:'◉',label:'Tags Monitoradas',value:'3.371',color:'var(--cyan)',bg:'rgba(6,182,212,0.1)',sub:'2935 caldeira · 436 spray'},
   {icon:'🌡',label:'Fornalha',value:fornalha?fmt(fornalha.value)+'°C':'—',color:'var(--orange)',bg:'rgba(249,115,22,0.1)',sub:'Nominal: 950°C'},
   {icon:'✓',label:'Normais',value:okCount,color:'var(--green)',bg:'rgba(16,185,129,0.1)',sub:`de ${analyses.length} analisados`},
   {icon:'⚠',label:'Alertas',value:critCount,color:critCount>0?'var(--red)':'var(--green)',bg:critCount>0?'rgba(239,68,68,0.1)':'rgba(16,185,129,0.1)',sub:'Desvio > 10%'},
   {icon:'💰',label:'Perda Estimada',value:fmtRs(custo.rsHora)+'/h',color:custo.rsHora>100?'var(--red)':custo.rsHora>10?'var(--orange)':'var(--green)',bg:custo.rsHora>100?'rgba(239,68,68,0.1)':custo.rsHora>10?'rgba(249,115,22,0.1)':'rgba(16,185,129,0.1)',sub:fmtRs(custo.rsMes)+'/mês · '+custo.equipamentos+' equip.'},
  ].forEach(k=>{
    html+=`<div class="kpi"><div class="kpi-icon" style="background:${k.bg};color:${k.color}">${k.icon}</div><div class="kpi-label">${k.label}</div><div class="kpi-value mono">${k.value}</div><div class="kpi-sub">${k.sub}</div></div>`;
  });
  html+=`</div>`;

  // Top 5 — Desvio Nominal vs Atual (com drill-down por área)
  html+=`<div class="card"><div class="card-title">Top 5 — Desvio Nominal vs Atual <span class="sub">filtre por área para ver o ranking local</span></div>
    <div id="top5Container"></div>
  </div>`;

  // Fan bar chart removed from overview — available in Ventiladores tab

  // Pareto — Equipamentos Críticos por Tipo (com drill-down por área)
  html+=`<div class="card"><div class="card-title">Pareto — Equipamentos Críticos por Tipo <span class="sub">filtre por área · clique em um tipo para expandir</span></div>
    <div id="paretoContainer"></div>
  </div>`;

  // Equipment grid by section
  [{title:'Ventiladores',ids:vents},{title:'Bombas Spray Dryer',ids:bombas},{title:'Temperaturas & Pressões',ids:[...temps,...press]},{title:'Vazão, Controle & Outros',ids:outros}].forEach(sec=>{
    if(sec.ids.length===0) return;
    html+=`<div class="section-title">${sec.title}</div><div class="equip-grid">`;
    sec.ids.forEach(id=>{ html+=renderEquipCard(id); });
    html+=`</div><div style="margin-bottom:16px"></div>`;
  });

  return html;
}

function renderCaldeira(){

function renderMotores(){
  // Motores que não são nem Bomba nem Ventilador: correias, roscas, hidráulicas, redlers,
  // air lift (ventilador massivo tratado como "motor" pesado), dosadores gravimétricos.
  const motorTypes=['Correia','Rosca','Hidráulica','Redler','AirLift','Dosador'];
  const ids=Object.keys(EQUIPMENT).filter(k=>motorTypes.includes(EQUIPMENT[k].type));
  const caldeira=ids.filter(id=>EQUIPMENT[id].area==='Caldeira Biomassa');
  const t2=ids.filter(id=>EQUIPMENT[id].area==='Spray Dryer T2');
  const t1=ids.filter(id=>EQUIPMENT[id].area==='Spray Dryer T1'||EQUIPMENT[id].area==='Spray Dryer');

  const getCorr=id=>{const e=EQUIPMENT[id];const t=e.tags.find(t=>t.var.includes('Corrente Atual')||t.var.includes('Corrente E3'));return t?t.value:0;};
  const getSpeed=id=>{const e=EQUIPMENT[id];const t=e.tags.find(t=>t.var.includes('Setpoint Velocidade')||t.var.includes('Velocidade Motor'));return t?t.value:0;};
  // Estimativa de kW por motor (trifásico 440V, fp 0.85):  kW = √3 * 440 * I * 0.85 / 1000
  const kwFromAmp=a=>a*440*1.732*0.85/1000;

  const totalCorr=ids.reduce((a,id)=>a+getCorr(id),0);
  const totalKw=ids.reduce((a,id)=>a+kwFromAmp(getCorr(id)),0);
  const operando=ids.filter(id=>EQUIPMENT[id].status==='Operando').length;

  let html=`<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">`;
  [{label:'Total Motores',value:ids.length,color:'var(--accent)'},
   {label:'Operando',value:operando,color:'var(--green)'},
   {label:'Corrente Total',value:fmt(totalCorr)+' A',color:'var(--cyan)'},
   {label:'Carga Estimada',value:fmt(totalKw,0)+' kW',color:'var(--yellow)'},
  ].forEach(k=>{
    html+=`<div class="kpi"><div class="kpi-bar" style="background:${k.color}"></div><div class="kpi-label">${k.label}</div><div class="kpi-value mono">${k.value}</div></div>`;
  });
  html+=`</div>`;

  html+=`<div class="card" style="margin-top:14px"><div class="card-title">Motores agrupam os acionamentos que não são bombas nem ventiladores</div>
    <div style="font-size:12px;color:var(--muted);line-height:1.6">Correias transportadoras, roscas dosadoras, unidades hidráulicas das grelhas, redlers de cinza, air lift e dosadores gravimétricos. Cargas elétricas estimadas a partir da corrente medida via fórmula trifásica (√3 · V · I · fp).</div>
  </div>`;

  const renderGroup=(title,color,groupIds)=>{
    if(groupIds.length===0) return '';
    let h=`<div style="font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px">${title}</div>`;
    h+=`<div class="card"><div class="bar-chart">`;
    const maxCorr=Math.max(...groupIds.map(getCorr),1);
    groupIds.forEach(id=>{
      const e=EQUIPMENT[id];
      const corr=getCorr(id);
      const kw=kwFromAmp(corr);
      h+=`<div class="bar-row clickable" data-equip="${id}" style="cursor:pointer">
        <div class="bar-label mono" title="${esc(e.name)}">${esc(id)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(corr/maxCorr*100)}%;background:${color};opacity:0.85;border-radius:4px"></div>
        </div>
        <div class="bar-val-label mono">${fmt(corr)} A · ~${fmt(kw,0)} kW</div>
      </div>`;
    });
    h+=`</div></div>`;
    return h;
  };

  html+=renderGroup('Caldeira Biomassa','var(--accent)',caldeira);
  html+=renderGroup('Torre 2 — Spray Dryer','var(--green)',t2);
  html+=renderGroup('Torre 1 — Spray Dryer','var(--cyan)',t1);

  // Tabela completa
  html+=`<div class="card" style="margin-top:16px"><div class="card-title">Tabela Completa — Todos Motores</div><table><thead><tr>
    <th style="text-align:center">TAG</th><th>Nome</th><th>Área</th><th>Tipo</th>
    <th style="text-align:right">Corrente</th><th style="text-align:right">Velocidade</th><th style="text-align:right">kW est.</th><th style="text-align:center">Status</th>
  </tr></thead><tbody>`;
  ids.forEach((id,i)=>{
    const e=EQUIPMENT[id];
    const corr=getCorr(id);
    const sp=getSpeed(id);
    const kw=kwFromAmp(corr);
    const statusCol=e.status==='Operando'?'var(--green)':(e.status==='Intermitente'?'var(--yellow)':'var(--dim)');
    html+=`<tr class="clickable" data-equip="${id}" style="${i%2?'background:rgba(255,255,255,0.015)':''}">
      <td class="mono" style="text-align:center;color:var(--accent);font-weight:600">${esc(id)}</td>
      <td>${esc(e.name)}</td>
      <td style="color:var(--dim);font-size:10px">${esc(e.area)}</td>
      <td style="color:var(--muted);font-size:11px">${esc(e.type)}</td>

// Gera série temporal sintética de consumo para um ativo (24 pontos = 24h),
// baseada no valor atual + ruído deterministico por id. Usado nos sparklines.
function buildTrendSeries(id,current,std,points){
  points=points||24;
  let h=0;for(let i=0;i<id.length;i++){h=((h<<5)-h+id.charCodeAt(i))|0;}
  const seed=Math.abs(h)||1;
  const rand=i=>{const x=Math.sin(seed*9301+i*49297+233)*43758.5453;return x-Math.floor(x);};
  const amp=(std||Math.abs(current||1)*0.08);
  const series=[];
  for(let i=0;i<points;i++){
    const drift=Math.sin(i/3+seed%7)*amp*0.6;
    const noise=(rand(i)-0.5)*amp*0.8;
    series.push((current||0)+drift+noise);
  }
  return series;
}

// Gera sparkline SVG inline dado um array de valores e cor
function buildSparkline(series,opt){
  opt=opt||{};
  const w=opt.w||110,h=opt.h||28,pad=2;
  if(!series||series.length<2) return '';
  const mn=Math.min(...series),mx=Math.max(...series);
  const range=(mx-mn)||1;
  const step=(w-pad*2)/(series.length-1);
  let path='';
  let area=`M ${pad} ${h-pad} `;
  series.forEach((v,i)=>{
    const x=pad+i*step;
    const y=pad+(h-pad*2)*(1-(v-mn)/range);
    path+=(i===0?`M ${x} ${y}`:` L ${x} ${y}`);
    area+=`L ${x} ${y} `;
  });
  area+=`L ${w-pad} ${h-pad} Z`;
  const last=series[series.length-1],first=series[0];
  const trend=last>first?'up':last<first?'down':'flat';
  const col=opt.color||(trend==='up'?'#ef4444':trend==='down'?'#10b981':'#94a3b8');
  const gradId='sg_'+Math.random().toString(36).slice(2,8);
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle;overflow:visible">
    <defs><linearGradient id="${gradId}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gradId})" stroke="none"/>
    <path d="${path}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// Gráfico de tendência maior para uso dentro do modal do equipamento
function buildTagTrendChart(series,opt){
  opt=opt||{};
  if(!series||series.length<2) return '';
  const w=720,h=130,padL=48,padR=16,padT=10,padB=22;
  const cw=w-padL-padR,ch=h-padT-padB;
  const vals=series.slice();
  if(opt.nominal!=null) vals.push(opt.nominal);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=(mx-mn)||1;
  const sx=i=>padL+i*(cw/(series.length-1));
  const sy=v=>padT+ch*(1-(v-mn)/range);
  let path='',area=`M ${padL} ${h-padB} `;
  series.forEach((v,i)=>{
    const x=sx(i),y=sy(v);
    path+=(i===0?`M ${x} ${y}`:` L ${x} ${y}`);
    area+=`L ${x} ${y} `;
  });
  area+=`L ${sx(series.length-1)} ${h-padB} Z`;
  const last=series[series.length-1],first=series[0];
  const trendCol=last>first?'#3b82f6':last<first?'#10b981':'#94a3b8';
  const gid='tg_'+Math.random().toString(36).slice(2,8);
  let svg=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:130px;display:block">
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${trendCol}" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="${trendCol}" stop-opacity="0"/>
    </linearGradient></defs>`;
  // Grid (5 níveis)
  for(let g=0;g<=4;g++){
    const y=padT+ch*g/4;
    const val=mx-range*g/4;
    svg+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    svg+=`<text x="${padL-6}" y="${y+3.5}" fill="#94a3b8" font-size="9" text-anchor="end" font-family="ui-monospace,monospace">${val.toFixed(Math.abs(val)<10?1:0)}</text>`;
  }
  // Linha nominal (se houver)
  if(opt.nominal!=null){
    const ny=sy(opt.nominal);
    svg+=`<line x1="${padL}" y1="${ny}" x2="${w-padR}" y2="${ny}" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4"/>`;
    svg+=`<text x="${w-padR-4}" y="${ny-4}" fill="#3b82f6" font-size="9" text-anchor="end" font-weight="600">nominal ${opt.nominal.toFixed(Math.abs(opt.nominal)<10?1:0)}</text>`;
  }
  // x labels (horas)
  for(let i=0;i<series.length;i+=4){
    const x=sx(i);
    const hourLabel=((24-series.length+i)%24).toString().padStart(2,'0')+'h';
    svg+=`<text x="${x}" y="${h-padB+14}" fill="#94a3b8" font-size="9" text-anchor="middle">${hourLabel}</text>`;
  }
  // Área + linha
  svg+=`<path d="${area}" fill="url(#${gid})"/>`;
  svg+=`<path d="${path}" fill="none" stroke="${trendCol}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`;
  // Ponto final
  svg+=`<circle cx="${sx(series.length-1)}" cy="${sy(last)}" r="3.5" fill="${trendCol}" stroke="#fff" stroke-width="1.5"/>`;
  svg+=`</svg>`;
  return svg;
}

// Indicador de tendência (seta + delta %)
function trendIndicator(series){
  if(!series||series.length<2) return '';
  const first=series[0],last=series[series.length-1];
  const delta=first!==0?((last-first)/Math.abs(first))*100:0;
  const arr=delta>0.5?'▲':delta<-0.5?'▼':'◆';
  const col=delta>0.5?'var(--red)':delta<-0.5?'var(--green)':'var(--dim)';
  return `<span style="color:${col};font-size:10px;font-weight:600;white-space:nowrap">${arr} ${delta>=0?'+':''}${delta.toFixed(1)}%</span>`;
}

// Estado global do drill-down do radar
const RADAR_STATE={area:null,selected:[]};

function renderRadarDrilldown(){
  const ct=document.getElementById('radarContainer');
  if(!ct) return;
  // 1) lista áreas disponíveis
  const allItems=Object.entries(EQUIPMENT).map(([k,e])=>{
    const a=getEquipAnalysis(k);
    if(!a||a.desvio===null) return null;
    return {id:k,...e,...a};
  }).filter(Boolean);
  const areas=[...new Set(allItems.map(i=>i.area))].sort();
  if(!RADAR_STATE.area) RADAR_STATE.area=areas[0];
  // 2) equipamentos da área selecionada
  const inArea=allItems.filter(i=>i.area===RADAR_STATE.area).sort((a,b)=>Math.abs(b.desvio)-Math.abs(a.desvio));
  // inicializa seleção com top 4 se vazio ou área mudou
  if(RADAR_STATE.selected.length===0||!RADAR_STATE.selected.every(id=>inArea.some(i=>i.id===id))){
    RADAR_STATE.selected=inArea.slice(0,Math.min(4,inArea.length)).map(i=>i.id);
  }

  let html=`<div style="margin-bottom:14px">
    <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.8px;margin-bottom:6px">ETAPA 1 — ÁREA</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;
  areas.forEach(ar=>{
    const active=ar===RADAR_STATE.area;
    html+=`<button class="radar-chip ${active?'active':''}" onclick="setRadarArea('${esc(ar).replace(/'/g,"\\'")}')">${esc(ar)}</button>`;
  });
  html+=`</div></div>`;

  html+=`<div style="margin-bottom:14px">
    <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.8px;margin-bottom:6px">ETAPA 2 — EQUIPAMENTOS (até 4)</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;
  inArea.forEach(it=>{
    const active=RADAR_STATE.selected.indexOf(it.id)>=0;
    html+=`<button class="radar-chip equip ${active?'active':''}" onclick="toggleRadarEquip('${it.id}')" title="${esc(it.name)}">
      <span class="mono">${esc(it.id)}</span>
      <span style="color:var(--dim);font-weight:400">· ${esc(it.type||'')}</span>
    </button>`;
  });
  html+=`</div></div>`;

  // 3) gráfico radar com equipamentos selecionados
  const selected=inArea.filter(i=>RADAR_STATE.selected.indexOf(i.id)>=0).slice(0,4);
  html+=buildRadarChart(selected);
  ct.innerHTML=html;
}

function setRadarArea(area){
  RADAR_STATE.area=area;
  RADAR_STATE.selected=[];
  renderRadarDrilldown();
}

function toggleRadarEquip(id){
  const idx=RADAR_STATE.selected.indexOf(id);
  if(idx>=0) RADAR_STATE.selected.splice(idx,1);
  else if(RADAR_STATE.selected.length<4) RADAR_STATE.selected.push(id);
  renderRadarDrilldown();
}

// --------- PARETO drill-down ---------
function renderParetoDrilldown(){
  const ct=document.getElementById('paretoContainer');
  if(!ct) return;
  const all=getAllAnalysisItems();
  const areas=[...new Set(all.map(i=>i.area))].sort();
  if(PARETO_STATE.area!=='__all__'&&!areas.includes(PARETO_STATE.area)) PARETO_STATE.area='__all__';

  let html=buildAreaChipRow('ETAPA 1 — ÁREA',areas,PARETO_STATE.area,'setParetoArea');

  const scoped=PARETO_STATE.area==='__all__'?all:all.filter(i=>i.area===PARETO_STATE.area);

  // Agrupa por tipo (ou área se não tiver tipo)
  const buckets={};
  scoped.forEach(x=>{
    const key=x.type||x.area||'Outros';
    if(!buckets[key]) buckets[key]={area:key,critico:0,alerta:0,atencao:0,normal:0};
    const abs=Math.abs(x.desvio);
    if(abs>15) buckets[key].critico++;
    else if(abs>10) buckets[key].alerta++;
    else if(abs>5) buckets[key].atencao++;
    else buckets[key].normal++;
  });
  const arr=Object.values(buckets).map(a=>({...a,desvios:a.critico+a.alerta+a.atencao})).sort((a,b)=>b.desvios-a.desvios||b.critico-a.critico);
  const maxDesvios=Math.max(...arr.map(a=>a.desvios),1);
  const totalDesvios=arr.reduce((s,a)=>s+a.desvios,0);

  if(arr.length===0||totalDesvios===0){
    html+=`<div style="padding:24px;color:var(--dim);text-align:center;font-size:12px">Sem desvios relevantes nesta área.</div>`;
    ct.innerHTML=html;
    return;
  }

  html+=`<div class="pareto-container">`;
  let cumPct=0;
  arr.forEach(a=>{
    if(a.desvios===0) return;
    const pct=(a.desvios/totalDesvios*100);
    cumPct+=pct;
    const barW=(a.desvios/maxDesvios*100);
    const critW=(a.critico/a.desvios*barW);
    const alertW=(a.alerta/a.desvios*barW);
    const atencW=(a.atencao/a.desvios*barW);
    const safeType=esc(a.area).replace(/[^a-zA-Z0-9]/g,'_');
    const isExpanded=PARETO_STATE.expanded===a.area;
    html+=`<div class="pareto-row" onclick="toggleParetoDrilldown('${esc(a.area).replace(/'/g,"\\'")}')">
      <div class="pareto-label">${esc(a.area)} <span style="font-size:8px;color:var(--accent)">${isExpanded?'▼':'▶'}</span></div>
      <div class="pareto-bar-wrap">
        <div class="pareto-bar-track">
          <div style="display:flex;height:100%">
            ${a.critico>0?`<div class="pareto-bar-fill" style="width:${critW}%;background:var(--red)"><span class="pareto-bar-count">${a.critico}</span></div>`:''}
            ${a.alerta>0?`<div class="pareto-bar-fill" style="width:${alertW}%;background:var(--orange)"><span class="pareto-bar-count">${a.alerta}</span></div>`:''}
            ${a.atencao>0?`<div class="pareto-bar-fill" style="width:${atencW}%;background:var(--yellow)"><span class="pareto-bar-count">${a.atencao}</span></div>`:''}
          </div>
        </div>
        <div class="pareto-pct mono">${fmt(cumPct,0)}%</div>
      </div>
    </div>`;
    if(isExpanded){
      const typeEquips=scoped.filter(x=>(x.type||x.area)===a.area).sort((x,y)=>Math.abs(y.desvio)-Math.abs(x.desvio));
      const avgDesvio=typeEquips.length>0?(typeEquips.reduce((s,x)=>s+Math.abs(x.desvio),0)/typeEquips.length):0;
      const worst=typeEquips[0];
      const insightClass=a.critico>0?'critical':a.alerta>0?'warning':'ok';
      html+=`<div class="pareto-detail open" style="max-height:none;padding:14px 16px 16px">
        <div class="pareto-detail-header">

            <span style="color:var(--orange)">■ ${a.alerta} alerta${a.alerta!==1?'s':''}</span>
            <span style="color:var(--yellow)">■ ${a.atencao} atenção</span>
            <span style="color:var(--green)">■ ${a.normal} normal</span>
          </div>
        </div>
        <table class="pareto-equip-table"><thead><tr>

function renderHeatmapDrilldown(){
  const ct=document.getElementById('heatmapContainer');
  if(!ct) return;
  const all=getAllAnalysisItems().sort((a,b)=>Math.abs(b.desvio)-Math.abs(a.desvio));
  const areas=[...new Set(all.map(i=>i.area))].sort();
  if(HEATMAP_STATE.area!=='__all__'&&!areas.includes(HEATMAP_STATE.area)) HEATMAP_STATE.area='__all__';

  const scoped=HEATMAP_STATE.area==='__all__'?all:all.filter(i=>i.area===HEATMAP_STATE.area);

  // valida seleção: remove ids fora do escopo
  HEATMAP_STATE.selected=HEATMAP_STATE.selected.filter(id=>scoped.some(i=>i.id===id));
  // inicializa com top 10 se vazio
  if(HEATMAP_STATE.selected.length===0){
    HEATMAP_STATE.selected=scoped.slice(0,Math.min(10,scoped.length)).map(i=>i.id);
  }

  let html=buildAreaChipRow('ETAPA 1 — ÁREA',areas,HEATMAP_STATE.area,'setHeatmapArea');

  html+=`<div style="margin-bottom:14px">
    <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.8px;margin-bottom:6px">ETAPA 2 — ATIVOS (clique para incluir/remover)</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;
  scoped.forEach(it=>{
    const active=HEATMAP_STATE.selected.indexOf(it.id)>=0;
    html+=`<button class="radar-chip equip ${active?'active':''}" onclick="toggleHeatmapEquip('${it.id}')" title="${esc(it.name)}">
      <span class="mono">${esc(it.id)}</span>
      <span style="color:${active?'rgba(255,255,255,0.75)':'var(--dim)'};font-weight:400">· ${esc(it.type||it.area||'')}</span>
    </button>`;
  });
  html+=`</div></div>`;

  const selectedItems=scoped.filter(i=>HEATMAP_STATE.selected.indexOf(i.id)>=0);
  if(selectedItems.length===0){
    html+=`<div style="padding:24px;color:var(--dim);text-align:center;font-size:12px">Selecione ao menos um ativo para visualizar o heatmap.</div>`;
  }else{
    html+=buildDeviationHeatmap(selectedItems,30);
  }
  ct.innerHTML=html;
}

function setHeatmapArea(area){
  HEATMAP_STATE.area=area;
  HEATMAP_STATE.selected=[];
  renderHeatmapDrilldown();
}

function toggleHeatmapEquip(id){
  const idx=HEATMAP_STATE.selected.indexOf(id);
  if(idx>=0) HEATMAP_STATE.selected.splice(idx,1);
  else HEATMAP_STATE.selected.push(id);
  renderHeatmapDrilldown();
}

// SIMULADOR T1/T2 — viabilidade e comparação de consumo
// -------------------------------------------------------------------

const SIMULATOR_STATE={
  tonsPerDay:120,
  hoursPerDay:20,
  humidity:35,     // % umidade do alimentado (baseline 35%)
  ambientTemp:25,  // °C (baseline 25°C)
  showParams:false,
  showImport:false,
  importText:'',
  importStatus:null,    // {ok:bool, msg:string, rowsT1:n, rowsT2:n, fitted:{t1,t2}}
  dataSource:'default', // 'default' | 'real'
  t1:{
    name:'Torre 1',
    min:4,    // ton/h mínimo operacional
    opt:6.5,  // ton/h ponto ótimo
    max:8,    // ton/h capacidade máxima
    kwhAtOpt:215,   // kWh por ton produzida no ponto ótimo
    vaporAtOpt:1.85 // ton de vapor por ton produto
  },
  t2:{
    name:'Torre 2',
    min:5,
    opt:8,
    max:10,
    kwhAtOpt:198,
    vaporAtOpt:1.78
  }
};

// modelo de consumo — curva quadrática em torno do ponto ótimo
function simulateTower(tower,tonPerHour,humidity,ambientTemp){
  if(tonPerHour<tower.min) return {viavel:false,motivo:`Abaixo do mínimo (${tower.min} t/h)`,tonPerHour};
  if(tonPerHour>tower.max) return {viavel:false,motivo:`Acima da capacidade (${tower.max} t/h)`,tonPerHour};
  // penalidade quadrática: 0 no ponto ótimo, +18% nos extremos
  const range=tonPerHour<tower.opt?(tower.opt-tower.min):(tower.max-tower.opt);
  const dev=(tonPerHour-tower.opt)/range;
  const penalty=0.18*dev*dev;
  // correções de umidade e temperatura (linear)
  const humCorr=1+(humidity-35)/100*1.5;      // +1.5% por ponto acima de 35%
  const tempCorr=1-(ambientTemp-25)*0.003;    // -0.3% kWh por °C acima de 25
  const kwhPerTon=tower.kwhAtOpt*(1+penalty)*tempCorr;
  const vaporPerTon=tower.vaporAtOpt*(1+penalty*0.7)*humCorr;
  return {
    viavel:true,
    tonPerHour,
    kwhPerTon,
    vaporPerTon,
    penaltyPct:penalty*100,
    humCorrPct:(humCorr-1)*100,
    tempCorrPct:(tempCorr-1)*100
  };
}

function computeSimulation(){
  const s=SIMULATOR_STATE;
  const tph=s.tonsPerDay/Math.max(s.hoursPerDay,1);
  const t1=simulateTower(s.t1,tph,s.humidity,s.ambientTemp);
  const t2=simulateTower(s.t2,tph,s.humidity,s.ambientTemp);
  // totais
  [t1,t2].forEach(r=>{
    if(r.viavel){
      r.kwhDay=r.kwhPerTon*s.tonsPerDay;
      r.vaporDay=r.vaporPerTon*s.tonsPerDay;
      r.custoDia=r.kwhDay*0.55+r.vaporDay*85; // R$0,55/kWh + R$85/ton vapor (editável no futuro)
    }
  });
  // recomendação
  let recomendacao=null;
  if(t1.viavel&&t2.viavel){
    recomendacao=t1.custoDia<t2.custoDia?'t1':'t2';
  } else if(t1.viavel){
    recomendacao='t1';
  } else if(t2.viavel){
    recomendacao='t2';
  }
  return {tph,t1,t2,recomendacao};
}

  html+=buildLinhasFunnel();
